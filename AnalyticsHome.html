const { useState, useEffect, useRef } = React;

function Button({ children, variant="primary", size="md", icon, iconRight, onClick, style }) {
  const base = { display:"inline-flex", alignItems:"center", gap:6, fontFamily:"Inter, system-ui", fontWeight:500, fontSize:size==="sm"?13:14, lineHeight:"20px", letterSpacing:"-0.006em", padding:size==="sm"?"5px 10px":"8px 14px", borderRadius:8, border:"1px solid transparent", cursor:"pointer", whiteSpace:"nowrap", transition:"background 120ms ease" };
  const variants = { primary:{background:"#207460",color:"#fff"}, secondary:{background:"#fff",color:"#161A18",borderColor:"#E0E5E4"}, ghost:{background:"transparent",color:"#525C59"}, danger:{background:"#E55767",color:"#fff"} };
  return <button onClick={onClick} style={{...base,...variants[variant],...style}} onMouseEnter={(e)=>{ if(variant==="primary")e.currentTarget.style.background="#155042"; if(variant==="secondary")e.currentTarget.style.background="#F5F7F6"; if(variant==="ghost"){e.currentTarget.style.background="#F5F7F6";e.currentTarget.style.color="#161A18";} }} onMouseLeave={(e)=>Object.assign(e.currentTarget.style,variants[variant])}>{icon&&<i className={icon}></i>}{children}{iconRight&&<i className={iconRight}></i>}</button>;
}

function Avatar({ initials, size=32, tone="sage", status }) {
  const t = {sage:{bg:"#D4E8E2",fg:"#155042"},honey:{bg:"#FCE6CF",fg:"#7A4C18"},gray:{bg:"#E0E5E4",fg:"#313836"}}[tone]||{bg:"#D4E8E2",fg:"#155042"};
  return <div style={{position:"relative",width:size,height:size,flex:`0 0 ${size}px`}}><div style={{width:size,height:size,borderRadius:999,background:t.bg,color:t.fg,display:"grid",placeItems:"center",fontWeight:500,fontSize:Math.round(size*0.38)}}>{initials}</div>{status&&<span style={{position:"absolute",right:-1,bottom:-1,width:Math.max(8,size*0.28),height:Math.max(8,size*0.28),borderRadius:999,background:"#2E744C",border:"2px solid #fff"}}></span>}</div>;
}

function NavItem({ icon, label, active, onClick, hasChevron }) {
  const [hover, setHover] = useState(false);
  return <div onClick={onClick} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} style={{display:"flex",alignItems:"center",gap:10,height:34,padding:"0 12px",borderRadius:8,cursor:"pointer",background:active?"#E0E5E4":(hover?"#EFF2F1":"transparent"),color:active?"#161A18":(hover?"#161A18":"#525C59"),fontWeight:500,fontSize:14,letterSpacing:"-0.006em"}}><i className={icon} style={{fontSize:16,color:active?"#1A6251":"#9AA3A1"}}></i><span style={{flex:1}}>{label}</span>{hasChevron&&<i className="ri-arrow-right-s-line" style={{fontSize:16,color:"#9AA3A1"}}></i>}</div>;
}

function AccountRow({ label, active, dot="#9AA3A1" }) {
  return <div style={{position:"relative"}}>{active&&<span style={{position:"absolute",left:-12,top:4,bottom:4,width:3,borderRadius:"0 3px 3px 0",background:"#207460"}}></span>}<div style={{display:"flex",alignItems:"center",gap:10,height:30,padding:"0 12px",borderRadius:8,cursor:"pointer",fontSize:13,color:"#161A18",fontWeight:active?500:400,background:active?"#E0E5E4":"transparent"}}><span style={{width:6,height:6,borderRadius:999,background:active?"#207460":dot}}></span><span style={{flex:1}}>{label}</span>{active&&<i className="ri-check-line" style={{color:"#207460"}}></i>}</div></div>;
}

    <div style={{padding:"0 8px",flex:1,overflowY:"auto"}}>
      <div style={{marginTop:8}}><div style={{fontSize:11,textTransform:"uppercase",color:"#9AA3A1",letterSpacing:"0.06em",fontWeight:500,padding:"0 12px 6px"}}>MAIN</div>{items.map(it=><NavItem key={it.key} icon={it.icon} label={it.label} active={activeKey===it.key} onClick={()=>onNavigate&&onNavigate(it.key)} hasChevron={it.hasChevron&&activeKey===it.key}/>)}</div>
      <div style={{marginTop:14}}><div style={{fontSize:11,textTransform:"uppercase",color:"#9AA3A1",letterSpacing:"0.06em",fontWeight:500,padding:"0 12px 6px"}}>FAVORITES</div><NavItem icon="ri-star-line" label="H-1B Lottery Command Center"/></div>
      <div style={{marginTop:14}}><div style={{fontSize:11,textTransform:"uppercase",color:"#9AA3A1",letterSpacing:"0.06em",fontWeight:500,padding:"0 12px 6px"}}>PLATFORM</div><NavItem icon="ri-settings-3-line" label="Settings"/><NavItem icon="ri-customer-service-2-line" label="Support"/></div>
    </div>
    <div style={{borderTop:"1px solid #E0E5E4",padding:"12px 8px 8px"}}>
      <div style={{fontSize:11,textTransform:"uppercase",color:"#9AA3A1",letterSpacing:"0.06em",fontWeight:500,padding:"0 12px 4px"}}>ALMACA, INC.</div><AccountRow label="Employee Account"/>
      <div style={{marginTop:12}}><div style={{fontSize:11,textTransform:"uppercase",color:"#9AA3A1",letterSpacing:"0.06em",fontWeight:500,padding:"0 12px 4px"}}>ALMA LEGAL SERVICES, P.C.</div><AccountRow label="Employer Account" active/><AccountRow label="Employee Account"/></div>
      <div style={{marginTop:12}}><div style={{fontSize:11,textTransform:"uppercase",color:"#9AA3A1",letterSpacing:"0.06em",fontWeight:500,padding:"0 12px 4px"}}>PERSONAL</div><AccountRow label="Self-Petitioned Cases" dot="#C4CBCA"/></div>
    </div>
    <div style={{margin:"8px 12px 12px",padding:"8px 4px",display:"flex",alignItems:"center",gap:10}}><Avatar initials="AT" tone="honey" size={36} status="online"/><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:500,color:"#161A18"}}>Assel Tuleubayeva</div><div style={{fontSize:11,color:"#525C59"}}>sophia@tryalma.com</div></div><i className="ri-arrow-right-s-line" style={{color:"#9AA3A1"}}></i></div>
  </aside>;
}

function CardMenu({ items }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{position:"relative"}} onClick={(e)=>e.stopPropagation()}>
      <button onClick={()=>setOpen(!open)} style={{width:26,height:26,display:"grid",placeItems:"center",background:open?"#F5F7F6":"transparent",border:0,borderRadius:6,color:"#525C59",cursor:"pointer",fontSize:16}}><i className="ri-more-2-fill"></i></button>
      {open&&<><div style={{position:"fixed",inset:0,zIndex:10}} onClick={()=>setOpen(false)}/><div style={{position:"absolute",right:0,top:30,background:"#fff",border:"1px solid #E0E5E4",borderRadius:8,boxShadow:"0 8px 24px rgba(10,13,20,0.10)",padding:4,minWidth:160,zIndex:11}}>
        {items.map(it=><button key={it} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"7px 10px",background:"transparent",border:0,borderRadius:6,fontSize:13,color:it==="Delete"?"#DC455A":"#161A18",cursor:"pointer",textAlign:"left",fontFamily:"Inter,system-ui"}} onMouseEnter={(e)=>e.currentTarget.style.background="#F5F7F6"} onMouseLeave={(e)=>e.currentTarget.style.background="transparent"}><i className={it==="Edit"?"ri-pencil-line":it==="Duplicate"?"ri-file-copy-line":it==="Delete"?"ri-delete-bin-line":"ri-add-circle-line"} style={{fontSize:14,color:it==="Delete"?"#DC455A":"#9AA3A1"}}></i>{it}</button>)}
      </div></>}
    </div>
  );
}

      <div style={{flex:1,overflowY:"auto",background:"#FCFDFC"}}>

        <div style={{padding:"8px 32px 0"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>

          <div style={{display:"flex",gap:14,overflowX:"auto",paddingBottom:8,scrollSnapType:"x mandatory",marginRight:-32}}>

              <div style={{width:36,height:36,borderRadius:8,background:"#EBF5F2",color:"#1A6251",display:"grid",placeItems:"center",fontSize:18}}><i className="ri-add-line"></i></div>
              <div style={{fontSize:13,fontWeight:500,color:"#161A18"}}>New dashboard</div>
              <div style={{fontSize:12,color:"#767F7D"}}>Group reports for review</div>
            </div>
            <div style={{flex:"0 0 32px"}}></div>
          </div>
        </div>
        <div style={{padding:"28px 32px 80px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <h2 style={{fontFamily:"'Inter Display',Inter",fontWeight:500,fontSize:18,color:"#161A18",margin:0,letterSpacing:"-0.005em"}}>Reports <span style={{color:"#9AA3A1",fontWeight:400}}>· {A_REPORTS.length}</span></h2>
            <div style={{display:"flex",gap:6}}>

              <button style={{height:30,padding:"0 10px",background:"transparent",border:"1px solid #E0E5E4",borderRadius:6,fontSize:12,color:"#525C59",cursor:"pointer",display:"inline-flex",alignItems:"center",gap:4}}><i className="ri-sort-desc" style={{fontSize:13}}></i> Recently updated</button>

          <div style={{display:"grid",gap:14,gridTemplateColumns:"repeat(auto-fill, minmax(220px, 1fr))"}}>

}

// ─── SCREEN E ─────────────────────────────────────────────────

              <rect x="120" y="76" width="20" height="42" rx="3" fill="#207460"/>

            <p style={{fontSize:14,lineHeight:"20px",color:"#525C59",margin:"6px 0 20px"}}>Start by using a template or building from scratch. Templates give you a working MBR-Lite report in seconds.</p>

// ─── SCREEN F ─────────────────────────────────────────────────
function TemplateCard({ t, selected, onClick }) {
  const [hover, setHover] = useState(false);
  const typeColors = {"Grouped Count":{bg:"#EBF5F2",fg:"#1A6251",icon:"ri-bar-chart-2-line"},"Count Over Time":{bg:"#E1F3FF",fg:"#0072CC",icon:"ri-line-chart-line"},"Summary KPI":{bg:"#FEF2E6",fg:"#B87428",icon:"ri-number-1"},"List":{bg:"#EFF2F1",fg:"#525C59",icon:"ri-list-check-2"},"Table":{bg:"#F0EAFF",fg:"#5A3FB0",icon:"ri-table-line"}}[t.type];
  return (
    <button onClick={onClick} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{position:"relative",textAlign:"left",fontFamily:"Inter,system-ui",background:"#fff",border:`1.5px solid ${selected?"#207460":"#E0E5E4"}`,borderRadius:12,padding:16,cursor:"pointer",boxShadow:(hover||selected)?"0 4px 12px rgba(10,13,20,0.06)":"0 1px 2px rgba(10,13,20,0.03)",transition:"border-color 120ms",display:"flex",flexDirection:"column",gap:12,minHeight:144}}>
      <div style={{width:36,height:36,borderRadius:8,background:typeColors.bg,color:typeColors.fg,display:"grid",placeItems:"center",fontSize:18}}><i className={typeColors.icon}></i></div>
      <div style={{flex:1}}><div style={{fontFamily:"'Inter Display',Inter",fontWeight:500,fontSize:14,color:"#161A18",letterSpacing:"-0.005em",lineHeight:"20px"}}>{t.name}</div><div style={{fontSize:12,color:"#525C59",lineHeight:"18px",marginTop:4}}>{t.desc}</div></div>
      <span style={{display:"inline-flex",alignSelf:"flex-start",padding:"2px 8px",borderRadius:4,background:typeColors.bg,color:typeColors.fg,fontSize:11,fontWeight:500}}>{t.type}</span>
      {selected&&<span style={{position:"absolute",top:12,right:12,width:22,height:22,borderRadius:999,background:"#207460",color:"#fff",display:"grid",placeItems:"center",fontSize:12}}><i className="ri-check-line"></i></span>}
    </button>
  );
}

function ScreenF({ onUse, onClose }) {
  const [activeCat, setActiveCat] = useState("population");
  const [selected, setSelected] = useState(F_TEMPLATES.population[0]);
  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",height:"100vh",background:"#FCFDFC"}}>
      <div style={{padding:"24px 32px 16px",borderBottom:"1px solid #E0E5E4",background:"#fff"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:12,color:"#767F7D",marginBottom:4,letterSpacing:"0.04em",textTransform:"uppercase",fontWeight:500}}>Templates</div>
            <h1 style={{fontFamily:"'Inter Display',Inter,system-ui",fontSize:28,lineHeight:"36px",letterSpacing:"-0.012em",fontWeight:500,color:"#161A18",margin:0}}>Template Library</h1>
            <p style={{fontSize:13,lineHeight:"20px",color:"#525C59",margin:"4px 0 0",maxWidth:640}}>Pre-built MBR-Lite reports for immigration programs. Pick one and customize from there.</p>
          </div>
          <button onClick={onClose} style={{height:32,padding:"0 12px",background:"transparent",border:"1px solid #E0E5E4",borderRadius:8,fontSize:13,color:"#525C59",cursor:"pointer",fontFamily:"Inter,system-ui",display:"inline-flex",alignItems:"center",gap:6}}><i className="ri-close-line"></i> Close</button>
        </div>
      </div>
      <div style={{flex:1,display:"flex",minHeight:0}}>
        <div style={{width:220,flex:"0 0 220px",borderRight:"1px solid #E0E5E4",background:"#FCFDFC",padding:"16px 8px"}}>
          <div style={{fontSize:11,fontWeight:500,color:"#525C59",letterSpacing:"0.06em",textTransform:"uppercase",padding:"0 12px 8px"}}>Categories</div>
          <div style={{display:"flex",flexDirection:"column",gap:1}}>
            {F_CATEGORIES.map(c=>{const isActive=activeCat===c.id;return<button key={c.id} onClick={()=>{setActiveCat(c.id);setSelected(F_TEMPLATES[c.id][0]);}} style={{display:"flex",alignItems:"center",gap:10,height:34,padding:"0 12px",borderRadius:6,background:isActive?"#E0E5E4":"transparent",color:isActive?"#161A18":"#525C59",border:0,cursor:"pointer",textAlign:"left",fontFamily:"Inter,system-ui",fontSize:13,fontWeight:500}}><i className={c.icon} style={{fontSize:15,color:isActive?"#1A6251":"#9AA3A1"}}></i><span style={{flex:1}}>{c.label}</span><span style={{fontSize:11,color:"#9AA3A1"}}>{F_TEMPLATES[c.id].length}</span></button>;})}
          </div>
        </div>
        <div style={{flex:1,display:"flex",minHeight:0}}>
          <div style={{flex:1,overflowY:"auto",padding:"20px 24px 32px"}}>
            {F_CATEGORIES.filter(c=>c.id===activeCat).map(c=>(
              <div key={c.id} style={{marginBottom:32}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><i className={c.icon} style={{color:"#1A6251",fontSize:16}}></i><h2 style={{fontFamily:"'Inter Display',Inter",fontWeight:500,fontSize:17,color:"#161A18",margin:0,letterSpacing:"-0.005em"}}>{c.label}</h2><span style={{fontSize:12,color:"#9AA3A1"}}>· {F_TEMPLATES[c.id].length}</span></div>
                <div style={{display:"grid",gap:14,gridTemplateColumns:"repeat(auto-fill, minmax(220px, 1fr))"}}>
                  {F_TEMPLATES[c.id].map(t=><TemplateCard key={t.id} t={t} selected={selected&&selected.id===t.id} onClick={()=>setSelected(t)}/>)}
                </div>
              </div>
            ))}
          </div>
          {selected&&(
            <div style={{width:380,flex:"0 0 380px",borderLeft:"1px solid #E0E5E4",background:"#fff",padding:"20px 24px",overflowY:"auto",display:"flex",flexDirection:"column",gap:14}}>
              <div style={{fontSize:11,color:"#767F7D",letterSpacing:"0.04em",textTransform:"uppercase",fontWeight:500}}>Preview</div>
              <div><h3 style={{fontFamily:"'Inter Display',Inter",fontWeight:500,fontSize:18,color:"#161A18",margin:0,letterSpacing:"-0.005em"}}>{selected.name}</h3><p style={{fontSize:13,color:"#525C59",lineHeight:"20px",margin:"6px 0 0"}}>{selected.desc}</p><span style={{display:"inline-flex",marginTop:10,padding:"2px 8px",borderRadius:4,background:"#EBF5F2",color:"#1A6251",fontSize:11,fontWeight:500}}>{selected.type}</span></div>
              <div style={{background:"#FCFDFC",border:"1px solid #E0E5E4",borderRadius:10,padding:16}}>
                <div style={{fontSize:12,color:"#525C59",marginBottom:8}}>Sample data</div>
                <div style={{display:"flex",alignItems:"flex-end",gap:8,height:120}}>
                  {[55,78,42,90,64,72,58].map((h,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><div style={{width:"100%",height:`${h}%`,background:["#207460","#4D9A88","#7AB5A6","#A8D0C5","#D88F4E","#F2BA77","#048AF5"][i],borderRadius:"3px 3px 0 0"}}></div></div>)}
                </div>
              </div>
              <div style={{background:"#F5F7F6",borderRadius:10,padding:12,fontSize:12,color:"#525C59",lineHeight:"18px"}}><div style={{fontWeight:500,color:"#313836",marginBottom:4}}>What you get</div><span style={{display:"block"}}>· Pre-configured fields and grouping</span><span style={{display:"block"}}>· Sensible default timeframe and filters</span><span style={{display:"block"}}>· Works on your live data — refresh anytime</span></div>
              <div style={{marginTop:"auto",display:"flex",gap:8}}><Button variant="secondary" style={{flex:1}}>Customize</Button><Button variant="primary" style={{flex:1}} onClick={onUse} icon="ri-magic-line">Use this template</Button></div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── STEP NAV ─────────────────────────────────────────────────
const SCREENS = [
  { id:"d", num:"D", label:"Analytics — Populated" },
  { id:"e", num:"E", label:"Analytics — Empty" },
  { id:"f", num:"F", label:"Template Library" },
];

function StepNav({ active, setActive }) {
  return (
    <div style={{position:"fixed",bottom:16,left:"50%",transform:"translateX(-50%)",display:"flex",alignItems:"center",gap:4,background:"#161A18",color:"#fff",padding:4,borderRadius:999,boxShadow:"0 8px 24px rgba(10,13,20,0.18)",zIndex:50,fontFamily:"Inter,system-ui"}}>
      {SCREENS.map(s=>{const isActive=active===s.id;return<button key={s.id} onClick={()=>setActive(s.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 14px 6px 8px",borderRadius:999,background:isActive?"#fff":"transparent",color:isActive?"#161A18":"#C4CBCA",border:0,cursor:"pointer",fontSize:13,fontWeight:500,transition:"all 120ms"}}><span style={{width:22,height:22,borderRadius:999,display:"grid",placeItems:"center",background:isActive?"#207460":"rgba(255,255,255,0.12)",color:"#fff",fontSize:11,fontWeight:600}}>{s.num}</span>{s.label}</button>;})}
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────
function App() {
  const getFromHash = () => { const h=window.location.hash.replace("#",""); return ["d","e","f"].includes(h)?h:"d"; };
  const [screen, setScreen] = useState(getFromHash);
  const [navActive, setNavActive] = useState("analytics");

  const go = (s) => { window.location.hash=s; setScreen(s); };

  useEffect(() => {
    const h = () => setScreen(getFromHash());
    window.addEventListener("hashchange", h);
    return () => window.removeEventListener("hashchange", h);
  }, []);

  return (
    <div style={{display:"flex",minHeight:"100vh",background:"#FCFDFC"}}>
      <Sidebar activeKey={navActive} onNavigate={setNavActive}/>
      {screen==="d"&&<ScreenD onNewReport={()=>go("f")} goToTemplate={()=>go("f")}/>}
      {screen==="e"&&<ScreenE onNewReport={()=>go("f")} goToTemplate={()=>go("f")}/>}
      {screen==="f"&&<ScreenF onUse={()=>go("d")} onClose={()=>go("d")}/>}
      <StepNav active={screen} setActive={go}/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);

</script>
</body>
</html>
