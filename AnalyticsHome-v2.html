<body><div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── ATOMS ────────────────────────────────────────────────────
function Button({ children, variant="primary", size="md", icon, iconRight, onClick, style, disabled }) {
  const base = { display:"inline-flex", alignItems:"center", gap:6, fontFamily:"Inter, system-ui", fontWeight:500, fontSize:size==="sm"?13:14, lineHeight:"20px", letterSpacing:"-0.006em", padding:size==="sm"?"5px 10px":"8px 14px", borderRadius:8, border:"1px solid transparent", cursor:disabled?"not-allowed":"pointer", whiteSpace:"nowrap", transition:"background 120ms ease", opacity:disabled?0.5:1 };
  const variants = { primary:{background:"#207460",color:"#fff"}, secondary:{background:"#fff",color:"#161A18",borderColor:"#E0E5E4"}, ghost:{background:"transparent",color:"#525C59"}, danger:{background:"#E55767",color:"#fff"} };
  return <button disabled={disabled} onClick={!disabled?onClick:undefined} style={{...base,...variants[variant],...style}} onMouseEnter={(e)=>{ if(disabled)return; if(variant==="primary")e.currentTarget.style.background="#155042"; if(variant==="secondary")e.currentTarget.style.background="#F5F7F6"; if(variant==="ghost"){e.currentTarget.style.background="#F5F7F6";e.currentTarget.style.color="#161A18";} }} onMouseLeave={(e)=>{ if(!disabled)Object.assign(e.currentTarget.style,variants[variant]); }}>{icon&&<i className={icon}></i>}{children}{iconRight&&<i className={iconRight}></i>}</button>;
}

function Avatar({ initials, size=32, tone="sage", status }) {
  const t = {sage:{bg:"#D4E8E2",fg:"#155042"},honey:{bg:"#FCE6CF",fg:"#7A4C18"}}[tone]||{bg:"#D4E8E2",fg:"#155042"};
  return <div style={{position:"relative",width:size,height:size,flex:`0 0 ${size}px`}}><div style={{width:size,height:size,borderRadius:999,background:t.bg,color:t.fg,display:"grid",placeItems:"center",fontWeight:500,fontSize:Math.round(size*0.38)}}>{initials}</div>{status&&<span style={{position:"absolute",right:-1,bottom:-1,width:Math.max(8,size*0.28),height:Math.max(8,size*0.28),borderRadius:999,background:"#2E744C",border:"2px solid #fff"}}></span>}</div>;
}

function NavItem({ icon, label, active, onClick, hasChevron, badge }) {
  const [hover, setHover] = useState(false);
  return <div onClick={onClick} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} style={{display:"flex",alignItems:"center",gap:10,height:34,padding:"0 12px",borderRadius:8,cursor:"pointer",background:active?"#E0E5E4":(hover?"#EFF2F1":"transparent"),color:active?"#161A18":(hover?"#161A18":"#525C59"),fontWeight:500,fontSize:14,letterSpacing:"-0.006em",userSelect:"none"}}><i className={icon} style={{fontSize:16,color:active?"#1A6251":"#9AA3A1"}}></i><span style={{flex:1}}>{label}</span>{badge&&<span style={{fontSize:11,padding:"1px 6px",borderRadius:4,background:active?"#207460":"#E0E5E4",color:active?"#fff":"#525C59",fontWeight:600}}>{badge}</span>}{hasChevron&&<i className="ri-arrow-right-s-line" style={{fontSize:16,color:"#9AA3A1"}}></i>}</div>;
}

function AccountRow({ label, active, dot="#9AA3A1" }) {
  return <div style={{position:"relative"}}>{active&&<span style={{position:"absolute",left:-12,top:4,bottom:4,width:3,borderRadius:"0 3px 3px 0",background:"#207460"}}></span>}<div style={{display:"flex",alignItems:"center",gap:10,height:30,padding:"0 12px",borderRadius:8,cursor:"pointer",fontSize:13,color:"#161A18",fontWeight:active?500:400,background:active?"#E0E5E4":"transparent"}}><span style={{width:6,height:6,borderRadius:999,background:active?"#207460":dot}}></span><span style={{flex:1}}>{label}</span>{active&&<i className="ri-check-line" style={{color:"#207460"}}></i>}</div></div>;
}

// ─── MAIN SIDEBAR (icon-only strip) ─────────────────────────
function Sidebar({ activeKey, onNavigate }) {
  const items = [
    {key:"dashboard",     icon:"ri-dashboard-line"},
    {key:"beneficiaries", icon:"ri-user-3-line"},
    {key:"cases",         icon:"ri-briefcase-line"},
    {key:"petitioners",   icon:"ri-bank-line"},
    {key:"analytics",     icon:"ri-bar-chart-2-line"},
    {key:"questionnaires",icon:"ri-questionnaire-line"},
    {key:"billing",       icon:"ri-bill-line"},
  ];
  const bottom = [
    {key:"settings", icon:"ri-settings-3-line"},
    {key:"support",  icon:"ri-customer-service-2-line"},
  ];
  return <aside style={{width:56,height:"100vh",background:"#F5F7F6",borderRight:"1px solid #E0E5E4",display:"flex",flexDirection:"column",alignItems:"center",flex:"0 0 56px",position:"sticky",top:0}}>
    {/* Logo */}
    <div style={{width:56,height:56,display:"grid",placeItems:"center",flexShrink:0}}>
      <div style={{width:30,height:30,borderRadius:8,background:"#207460",display:"grid",placeItems:"center"}}>
        <i className="ri-leaf-line" style={{fontSize:16,color:"#fff"}}></i>
      </div>
    </div>
    {/* Main nav icons */}
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 6px",width:"100%"}}>
      {items.map(it=>{
        const isActive=activeKey===it.key;
        return <button key={it.key} onClick={()=>onNavigate(it.key)}
          title={it.key.charAt(0).toUpperCase()+it.key.slice(1)}
          style={{width:40,height:36,display:"grid",placeItems:"center",borderRadius:8,border:0,cursor:"pointer",background:isActive?"#E0E5E4":"transparent",color:isActive?"#1A6251":"#9AA3A1",fontSize:18,transition:"all 120ms"}}
          onMouseEnter={(e)=>{if(!isActive){e.currentTarget.style.background="#EFF2F1";e.currentTarget.style.color="#525C59";}}}
          onMouseLeave={(e)=>{if(!isActive){e.currentTarget.style.background="transparent";e.currentTarget.style.color="#9AA3A1";}}}>
          <i className={it.icon}></i>
        </button>;
      })}
    </div>
    {/* Bottom icons */}
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"8px 6px",width:"100%",borderTop:"1px solid #E0E5E4"}}>
      {bottom.map(it=><button key={it.key} title={it.key} style={{width:40,height:36,display:"grid",placeItems:"center",borderRadius:8,border:0,cursor:"pointer",background:"transparent",color:"#9AA3A1",fontSize:18}} onMouseEnter={(e)=>{e.currentTarget.style.background="#EFF2F1";}} onMouseLeave={(e)=>{e.currentTarget.style.background="transparent";}}><i className={it.icon}></i></button>)}
      {/* Avatar */}
      <div style={{width:32,height:32,borderRadius:999,background:"#FCE6CF",color:"#7A4C18",display:"grid",placeItems:"center",fontSize:12,fontWeight:600,marginTop:4,cursor:"pointer"}}>AT</div>
    </div>
  </aside>;
}

// ─── ANALYTICS LEFT NAV ───────────────────────────────────────
// "Reports" and "Dashboards" are the two primary tabs.
// Sub-items (My reports, Shared, Favorites, Trash) live under Reports.
// Folders always visible.
function AnalyticsNav({ active, onNavigate }) {
  const [search, setSearch] = useState("");
  const folders = [
    {key:"f-exec",    label:"Executive Reviews", count:8},
    {key:"f-ops",     label:"Operations",        count:14},
    {key:"f-finance", label:"Finance",           count:9},
    {key:"f-lottery", label:"H-1B Lottery FY27", count:6, highlight:true},
  ];
  // Determine which top tab is active
  const topTab = (active==="dashboards"||active==="dashboard-canvas"||active==="dashboard-empty") ? "dashboards" : "reports";

  return <aside style={{width:248,flex:"0 0 248px",borderRight:"1px solid #E0E5E4",background:"#fff",height:"100vh",position:"sticky",top:0,display:"flex",flexDirection:"column"}}>
    {/* Search */}
    <div style={{padding:"14px 12px 10px"}}>
      <div style={{position:"relative"}}>
        <i className="ri-search-line" style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#9AA3A1",fontSize:14}}></i>
        <input value={search} onChange={(e)=>setSearch(e.target.value)} placeholder="Search reports..."
          style={{width:"100%",height:32,padding:"0 10px 0 32px",background:"#F5F7F6",border:"1px solid #E0E5E4",borderRadius:7,fontSize:13,color:"#161A18",outline:"none",fontFamily:"Inter,system-ui"}}/>
      </div>
    </div>

    <div style={{flex:1,overflowY:"auto",padding:"0 8px 16px"}}>
      {/* PRIMARY TABS: Reports | Dashboards */}
      {[
        {key:"reports",    icon:"ri-file-chart-line",  label:"Reports",    badge:"42"},
        {key:"dashboards", icon:"ri-layout-grid-line", label:"Dashboards", badge:"5"},
        {key:"templates",  icon:"ri-stack-line",       label:"Templates"},
      ].map(it=>{
        const isActive = active===it.key || (it.key==="reports" && !["dashboards","templates"].includes(active) && !active.startsWith("f-") && active!=="mine"&&active!=="shared"&&active!=="favorites"&&active!=="trash") || (it.key==="dashboards" && (active==="dashboard-canvas"||active==="dashboard-empty"));
        return <div key={it.key} onClick={()=>onNavigate(it.key)}
          style={{display:"flex",alignItems:"center",gap:9,height:34,padding:"0 10px",borderRadius:8,cursor:"pointer",marginBottom:1,background:isActive?"#E0E5E4":"transparent",color:isActive?"#161A18":"#525C59",fontWeight:500,fontSize:13}}>
          <i className={it.icon} style={{fontSize:15,color:isActive?"#1A6251":"#9AA3A1"}}></i>
          <span style={{flex:1}}>{it.label}</span>
          {it.badge&&<span style={{fontSize:11,color:"#9AA3A1"}}>{it.badge}</span>}
        </div>;
      })}

      {/* SUB-ITEMS under Reports */}
      <div style={{marginTop:4,marginBottom:4}}>
        {[
          {key:"mine",      icon:"ri-user-3-line",     label:"My reports",     badge:"12"},
          {key:"shared",    icon:"ri-team-line",       label:"Shared with me", badge:"18"},
          {key:"favorites", icon:"ri-star-line",       label:"Favorites",      badge:"5"},
          {key:"trash",     icon:"ri-delete-bin-line", label:"Trash",          badge:"3"},
        ].map(it=>{
          const isActive=active===it.key;
          return <div key={it.key} onClick={()=>onNavigate(it.key)}
            style={{display:"flex",alignItems:"center",gap:9,height:32,padding:"0 10px 0 24px",borderRadius:7,cursor:"pointer",marginBottom:1,background:isActive?"#E0E5E4":"transparent",color:isActive?"#161A18":"#525C59",fontSize:13,fontWeight:isActive?500:400}}>
            <i className={it.icon} style={{fontSize:14,color:isActive?"#1A6251":"#9AA3A1"}}></i>
            <span style={{flex:1}}>{it.label}</span>
            <span style={{fontSize:11,color:"#9AA3A1"}}>{it.badge}</span>
          </div>;
        })}
      </div>

      {/* Folders */}
      <div style={{marginTop:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 10px 6px"}}>
          <span style={{fontSize:11,fontWeight:500,color:"#9AA3A1",letterSpacing:"0.06em",textTransform:"uppercase"}}>FOLDERS</span>
          <button style={{width:18,height:18,display:"grid",placeItems:"center",background:"transparent",border:0,cursor:"pointer",color:"#9AA3A1"}}><i className="ri-add-line" style={{fontSize:13}}></i></button>
        </div>
        {folders.map(f=>{
          const isActive=active===f.key;
          return <div key={f.key} onClick={()=>onNavigate(f.key)}
            style={{display:"flex",alignItems:"center",gap:9,height:30,padding:"0 10px",borderRadius:7,cursor:"pointer",marginBottom:1,background:f.highlight?"#EBF5F2":(isActive?"#E0E5E4":"transparent"),color:"#161A18",fontSize:13,fontWeight:f.highlight?500:400}}>
            <i className="ri-folder-line" style={{fontSize:14,color:f.highlight?"#207460":"#9AA3A1"}}></i>
            <span style={{flex:1}}>{f.label}</span>
            <span style={{fontSize:11,color:"#9AA3A1"}}>{f.count}</span>
          </div>;
        })}
        <button style={{marginTop:6,width:"100%",height:28,padding:"0 10px",background:"transparent",border:"1px dashed #C4CBCA",borderRadius:7,display:"flex",alignItems:"center",gap:5,fontSize:12,color:"#767F7D",cursor:"pointer"}}>
          <i className="ri-add-line" style={{fontSize:12}}></i> New folder
        </button>
      </div>
    </div>
  </aside>;
}

// ─── CARD MENU ────────────────────────────────────────────────
function CardMenu({ items }) {
  const [open, setOpen] = useState(false);
  return <div style={{position:"relative"}} onClick={(e)=>e.stopPropagation()}>
    <button onClick={()=>setOpen(!open)} style={{width:26,height:26,display:"grid",placeItems:"center",background:open?"#F5F7F6":"transparent",border:0,borderRadius:6,color:"#525C59",cursor:"pointer",fontSize:16}}><i className="ri-more-2-fill"></i></button>
    {open&&<><div style={{position:"fixed",inset:0,zIndex:10}} onClick={()=>setOpen(false)}/><div style={{position:"absolute",right:0,top:30,background:"#fff",border:"1px solid #E0E5E4",borderRadius:8,boxShadow:"0 8px 24px rgba(10,13,20,0.10)",padding:4,minWidth:160,zIndex:11}}>
      {items.map(it=><button key={it} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"7px 10px",background:"transparent",border:0,borderRadius:6,fontSize:13,color:it==="Delete"?"#DC455A":"#161A18",cursor:"pointer",textAlign:"left",fontFamily:"Inter,system-ui"}} onMouseEnter={(e)=>e.currentTarget.style.background="#F5F7F6"} onMouseLeave={(e)=>e.currentTarget.style.background="transparent"}><i className={it==="Edit"?"ri-pencil-line":it==="Duplicate"?"ri-file-copy-line":it==="Delete"?"ri-delete-bin-line":"ri-add-circle-line"} style={{fontSize:14,color:it==="Delete"?"#DC455A":"#9AA3A1"}}></i>{it}</button>)}
    </div></>}
  </div>;
}

// ─── TYPE COLORS ──────────────────────────────────────────────
const TYPE_COLORS = {
  "Grouped Count":   {bg:"#EBF5F2",fg:"#1A6251"},

  "List":            {bg:"#EFF2F1",fg:"#525C59"},
  "Table":           {bg:"#F0EAFF",fg:"#5A3FB0"},

// ─── REPORT CARD ──────────────────────────────────────────────
function ReportCard({ r }) {
  const [hover, setHover] = useState(false);
  const tc = TYPE_COLORS[r.type]||{bg:"#EFF2F1",fg:"#525C59"};
  return <div onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
    style={{background:"#fff",border:"1px solid #E0E5E4",borderRadius:12,padding:16,cursor:"pointer",boxShadow:hover?"0 4px 12px rgba(10,13,20,0.06)":"0 1px 2px rgba(10,13,20,0.03)",transition:"box-shadow 120ms",display:"flex",flexDirection:"column",gap:12}}>
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
      <div style={{width:36,height:36,borderRadius:8,background:tc.bg,color:tc.fg,display:"grid",placeItems:"center",fontSize:18}}><i className={r.icon}></i></div>
      <CardMenu items={["Edit","Add to dashboard","Duplicate","Delete"]}/>
    </div>
    <div>
      <div style={{fontFamily:"'Inter Display',Inter",fontWeight:500,fontSize:14,color:"#161A18",letterSpacing:"-0.005em",lineHeight:"20px",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{r.name}</div>
      <span style={{display:"inline-flex",marginTop:6,padding:"2px 8px",borderRadius:4,background:tc.bg,color:tc.fg,fontSize:11,fontWeight:500}}>{r.type}</span>
    </div>
    <div style={{fontSize:11,color:"#767F7D",display:"flex",alignItems:"center",gap:6,marginTop:"auto"}}><span>{r.updated}</span><span style={{color:"#C4CBCA"}}>·</span><span>{r.by}</span></div>
  </div>;
}

    </div>
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
      <div style={{minWidth:0,flex:1}}>
        <div style={{fontFamily:"'Inter Display',Inter",fontWeight:500,fontSize:14,color:"#161A18",letterSpacing:"-0.005em",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{d.name}</div>
        <div style={{fontSize:12,color:"#525C59",marginTop:3}}><i className="ri-bar-chart-2-line" style={{fontSize:12,marginRight:4,color:"#9AA3A1"}}></i>{d.reports} reports</div>
        <div style={{fontSize:11,color:"#767F7D",marginTop:6,display:"flex",alignItems:"center",gap:5}}><span>Updated {d.updated}</span><span style={{color:"#C4CBCA"}}>·</span><span>{d.by}</span></div>
      </div>
      <CardMenu items={["Edit","Duplicate","Delete"]}/>
    </div>
  </div>;
}

// SCREEN F — TEMPLATE LIBRARY
// Now a full page within the analytics layout, not a separate overlay
// ═══════════════════════════════════════════════════════════════
function ScreenF({ navigate, activeCat, onCatChange }) {
  const [selected, setSelected] = useState(F_TEMPLATES[activeCat||"population"][0]);

  useEffect(()=>{ setSelected(F_TEMPLATES[activeCat||"population"][0]); }, [activeCat]);

  const cat = activeCat || "population";
  const templates = F_TEMPLATES[cat]||[];
  const catInfo = F_CATEGORIES.find(c=>c.id===cat)||F_CATEGORIES[0];
  const typeIcons = {"Grouped Count":"ri-bar-chart-2-line","Count Over Time":"ri-line-chart-line","Summary KPI":"ri-number-1","List":"ri-list-check-2","Table":"ri-table-line"};

  return <div style={{flex:1,display:"flex",minHeight:0,height:"100vh"}}>
    {/* Template grid */}
    <div style={{flex:1,overflowY:"auto",padding:"24px 28px 60px"}}>
      {/* Header */}
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <div style={{width:28,height:28,borderRadius:7,background:"#EBF5F2",color:"#1A6251",display:"grid",placeItems:"center",fontSize:14}}><i className={catInfo.icon}></i></div>
          <h1 style={{fontFamily:"'Inter Display',Inter",fontSize:22,fontWeight:500,color:"#161A18",letterSpacing:"-0.01em",margin:0}}>{catInfo.label}</h1>
          <span style={{fontSize:13,color:"#9AA3A1"}}>· {templates.length} templates</span>
        </div>
        <p style={{fontSize:13,color:"#525C59",margin:0,lineHeight:1.6}}>Pre-built reports for your immigration program. Select one to preview, then use it as a starting point.</p>
      </div>
      {/* Template cards */}
      <div style={{display:"grid",gap:14,gridTemplateColumns:"repeat(auto-fill, minmax(240px, 1fr))"}}>
        {templates.map(t=>{
          const tc = TYPE_COLORS[t.type]||{bg:"#EFF2F1",fg:"#525C59"};
          const isSelected = selected&&selected.id===t.id;
          return <button key={t.id} onClick={()=>setSelected(t)} style={{position:"relative",textAlign:"left",fontFamily:"Inter,system-ui",background:"#fff",border:`1.5px solid ${isSelected?"#207460":"#E0E5E4"}`,borderRadius:12,padding:16,cursor:"pointer",boxShadow:isSelected?"0 4px 12px rgba(32,116,96,0.1)":"0 1px 2px rgba(10,13,20,0.03)",transition:"all 120ms",display:"flex",flexDirection:"column",gap:12,minHeight:144}}>
            <div style={{width:36,height:36,borderRadius:8,background:tc.bg,color:tc.fg,display:"grid",placeItems:"center",fontSize:18}}><i className={typeIcons[t.type]||"ri-bar-chart-2-line"}></i></div>
            <div style={{flex:1}}><div style={{fontFamily:"'Inter Display',Inter",fontWeight:500,fontSize:14,color:"#161A18",lineHeight:"20px"}}>{t.name}</div><div style={{fontSize:12,color:"#525C59",lineHeight:"18px",marginTop:4}}>{t.desc}</div></div>
            <span style={{display:"inline-flex",alignSelf:"flex-start",padding:"2px 8px",borderRadius:4,background:tc.bg,color:tc.fg,fontSize:11,fontWeight:500}}>{t.type}</span>
            {isSelected&&<span style={{position:"absolute",top:12,right:12,width:20,height:20,borderRadius:999,background:"#207460",color:"#fff",display:"grid",placeItems:"center",fontSize:11}}><i className="ri-check-line"></i></span>}
          </button>;
        })}
      </div>
    </div>
    {/* Preview rail */}
    {selected&&<div style={{width:340,flex:"0 0 340px",borderLeft:"1px solid #E0E5E4",background:"#fff",padding:"20px 22px",overflowY:"auto",display:"flex",flexDirection:"column",gap:14}}>
      <div style={{fontSize:10,color:"#9AA3A1",letterSpacing:"0.06em",textTransform:"uppercase",fontWeight:500}}>Selected template</div>
      <div>
        <h3 style={{fontFamily:"'Inter Display',Inter",fontWeight:500,fontSize:17,color:"#161A18",margin:0,letterSpacing:"-0.005em"}}>{selected.name}</h3>
        <p style={{fontSize:13,color:"#525C59",lineHeight:"20px",margin:"6px 0 0"}}>{selected.desc}</p>
        <span style={{display:"inline-flex",marginTop:10,padding:"2px 8px",borderRadius:4,background:"#EBF5F2",color:"#1A6251",fontSize:11,fontWeight:500}}>{selected.type}</span>
      </div>
      <div style={{background:"#FCFDFC",border:"1px solid #E0E5E4",borderRadius:10,padding:14}}>
        <div style={{fontSize:11,color:"#767F7D",marginBottom:8,fontWeight:500}}>Sample output</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:6,height:100}}>
          {[55,78,42,90,64,72,58].map((h,i)=><div key={i} style={{flex:1,height:`${h}%`,background:["#207460","#4D9A88","#7AB5A6","#A8D0C5","#D88F4E","#F2BA77","#048AF5"][i],borderRadius:"3px 3px 0 0"}}></div>)}
        </div>
      </div>
      <div style={{background:"#F5F7F6",borderRadius:10,padding:12,fontSize:12,color:"#525C59",lineHeight:"18px"}}>
        <div style={{fontWeight:500,color:"#313836",marginBottom:5}}>What you get</div>
        <div>· Pre-configured fields and grouping</div>
        <div>· Sensible default timeframe and filters</div>
        <div>· Works on your live data immediately</div>
        <div>· Fully editable after creation</div>
      </div>
      <div style={{display:"flex",gap:8,marginTop:"auto"}}>
        <Button variant="secondary" style={{flex:1}} onClick={()=>navigate("builder")}>Customize</Button>
        <Button variant="primary" style={{flex:1}} icon="ri-magic-line" onClick={()=>navigate("builder")}>Use template</Button>
      </div>
    </div>}
  </div>;
}

// SCREEN: NEW DASHBOARD — creation modal over the analytics page
// ═══════════════════════════════════════════════════════════════
function NewDashboardModal({ onClose, onCreate }) {
  const [name, setName] = useState("");
  const [desc, setDesc] = useState("");
  const [visibility, setVisibility] = useState("shared");
  const canCreate = name.trim().length > 0;

  return <div style={{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"center"}}>
    {/* backdrop */}
    <div style={{position:"absolute",inset:0,background:"rgba(22,26,24,0.4)",backdropFilter:"blur(2px)"}} onClick={onClose}/>
    {/* modal */}
    <div style={{position:"relative",background:"#fff",borderRadius:14,width:480,boxShadow:"0 24px 48px rgba(10,13,20,0.16)",overflow:"hidden",zIndex:1}}>
      {/* header */}
      <div style={{padding:"22px 24px 18px",borderBottom:"1px solid #EFF2F1"}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
          <div>
            <h2 style={{fontFamily:"'Inter Display',Inter",fontSize:18,fontWeight:500,color:"#161A18",margin:0,letterSpacing:"-0.005em"}}>Create dashboard</h2>
            <p style={{fontSize:13,color:"#525C59",margin:"4px 0 0",lineHeight:"18px"}}>Dashboards group related reports into a single view for sharing with leadership.</p>
          </div>
          <button onClick={onClose} style={{width:28,height:28,display:"grid",placeItems:"center",background:"transparent",border:"1px solid #E0E5E4",borderRadius:7,cursor:"pointer",color:"#525C59",fontSize:16,flexShrink:0,marginLeft:12}}><i className="ri-close-line"></i></button>
        </div>
      </div>
      {/* body */}
      <div style={{padding:"20px 24px",display:"flex",flexDirection:"column",gap:18}}>
        {/* Name */}
        <div>
          <label style={{fontSize:12,fontWeight:600,color:"#525C59",display:"block",marginBottom:6}}>Dashboard name <span style={{color:"#E55767"}}>*</span></label>
          <input value={name} onChange={(e)=>setName(e.target.value)}
            placeholder="e.g. Immigration MBR — Q3 2026"
            autoFocus
            style={{width:"100%",height:36,padding:"0 12px",borderRadius:7,border:`1px solid ${name?"#A8D0C5":"#E0E5E4"}`,fontSize:13,color:"#161A18",outline:"none",fontFamily:"Inter,system-ui",transition:"border-color 120ms"}}
            onFocus={(e)=>e.target.style.borderColor="#A8D0C5"}
            onBlur={(e)=>e.target.style.borderColor=name?"#A8D0C5":"#E0E5E4"}/>
          <div style={{fontSize:11,color:"#9AA3A1",marginTop:4}}>This will be the title shown on the dashboard and in report cards.</div>
        </div>
        {/* Description */}
        <div>
          <label style={{fontSize:12,fontWeight:600,color:"#525C59",display:"block",marginBottom:6}}>Description <span style={{color:"#9AA3A1",fontWeight:400}}>(optional)</span></label>
          <textarea value={desc} onChange={(e)=>setDesc(e.target.value)}
            placeholder="Describe what this dashboard covers and who it's for..."
            style={{width:"100%",minHeight:72,padding:"9px 12px",borderRadius:7,border:"1px solid #E0E5E4",fontSize:13,color:"#161A18",outline:"none",fontFamily:"Inter,system-ui",resize:"vertical",lineHeight:"18px"}}
            onFocus={(e)=>e.target.style.borderColor="#A8D0C5"}
            onBlur={(e)=>e.target.style.borderColor="#E0E5E4"}/>
        </div>
        {/* Visibility */}
        <div>
          <label style={{fontSize:12,fontWeight:600,color:"#525C59",display:"block",marginBottom:6}}>Visibility</label>
          <div style={{display:"flex",gap:8}}>
            {[{v:"private",icon:"ri-lock-line",label:"Private",desc:"Only you can see this"},{v:"shared",icon:"ri-team-line",label:"Shared with team",desc:"Everyone on Alma can view"}].map(opt=>{
              const isActive = visibility===opt.v;
              return <button key={opt.v} onClick={()=>setVisibility(opt.v)} style={{flex:1,padding:"10px 12px",border:`1.5px solid ${isActive?"#207460":"#E0E5E4"}`,borderRadius:8,background:isActive?"#F5F7F6":"#fff",cursor:"pointer",textAlign:"left",transition:"all 120ms",display:"flex",alignItems:"flex-start",gap:8}}>
                <i className={opt.icon} style={{fontSize:16,color:isActive?"#207460":"#9AA3A1",marginTop:1}}></i>
                <div>
                  <div style={{fontSize:13,fontWeight:500,color:isActive?"#161A18":"#313836"}}>{opt.label}</div>
                  <div style={{fontSize:11,color:"#767F7D",marginTop:1}}>{opt.desc}</div>
                </div>
                {isActive&&<span style={{marginLeft:"auto",width:16,height:16,borderRadius:999,background:"#207460",display:"grid",placeItems:"center"}}><i className="ri-check-line" style={{fontSize:10,color:"#fff"}}></i></span>}
              </button>;
            })}
          </div>
        </div>
      </div>
      {/* footer */}
      <div style={{padding:"14px 24px 20px",borderTop:"1px solid #EFF2F1",display:"flex",gap:8,justifyContent:"flex-end"}}>
        <Button variant="secondary" onClick={onClose}>Cancel</Button>
        <Button variant="primary" icon="ri-dashboard-2-line" disabled={!canCreate} onClick={()=>{ if(canCreate) onCreate(name,desc,visibility); }}>Create dashboard</Button>
      </div>
    </div>
  </div>;
}

// ── Stacked Bar Chart ─────────────────────────────────────────
function DashStackedBar({ data, series, height=260 }) {
  const [hover, setHover] = useState(null);
  const W=860, H=height, padL=44, padR=12, padT=12, padB=26;
  const innerW=W-padL-padR, innerH=H-padT-padB;
  const totals = data.map(d=>series.reduce((s,k)=>s+(d.values[k.key]||0),0));
  const maxRaw = Math.max(...totals,1);
  const pow=Math.pow(10,Math.floor(Math.log10(maxRaw)));
  const n=maxRaw/pow;
  const max=(n<=1?1:n<=2?2:n<=5?5:10)*pow;
  const barW=innerW/data.length*0.6;
  const xC=i=>padL+(innerW/data.length)*(i+0.5);
  const yS=v=>padT+innerH-(v/max)*innerH;
  const yTicks=[0,20,40,60,80,100].filter(v=>v<=max);

  return <div style={{position:"relative",width:"100%"}}>
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,display:"block",overflow:"visible"}}>
      {yTicks.map(v=>{const y=yS(v);return<g key={v}>
        <line x1={padL} x2={W-padR} y1={y} y2={y} stroke={v===0?"#C4CBCA":"#EFF2F1"} strokeWidth="1"/>
        <text x={padL-8} y={y+4} fontSize="11" fill="#767F7D" textAnchor="end" fontFamily="Inter,system-ui">{v}</text>
      </g>;})}
      {data.map((d,i)=>{
        let acc=0; const cx=xC(i);
        return <g key={i} onMouseEnter={()=>setHover({i})} onMouseLeave={()=>setHover(null)}>
          <rect x={cx-innerW/data.length/2} y={padT} width={innerW/data.length} height={innerH} fill="transparent"/>
          {series.map((s,si)=>{
            const v=d.values[s.key]||0; if(!v) return null;
            const h=(v/max)*innerH, y=yS(acc+v); acc+=v;
            const isFirst=si===0||series.slice(0,si).every(ss=>!d.values[ss.key]);
            return <rect key={s.key} x={cx-barW/2} y={y} width={barW} height={h} fill={s.color} rx={isFirst?3:0} ry={isFirst?3:0} opacity={hover&&hover.i!==i?0.3:1}/>;
          })}
          {totals[i]>0&&<text x={cx} y={yS(totals[i])-5} fontSize="10" fill="#525C59" textAnchor="middle" fontFamily="Inter,system-ui" fontWeight="500">{totals[i]}</text>}
          <text x={cx} y={H-6} fontSize="10" fill="#9AA3A1" textAnchor="middle" fontFamily="Inter,system-ui">{d.label}</text>
        </g>;
      })}
    </svg>
    {hover&&<div style={{position:"absolute",top:0,left:`${(xC(hover.i)/W)*100}%`,transform:"translate(-50%,-100%)",background:"#161A18",color:"#fff",padding:"8px 10px",borderRadius:8,fontSize:12,minWidth:150,boxShadow:"0 8px 24px rgba(0,0,0,0.18)",pointerEvents:"none",zIndex:10}}>
      <div style={{fontWeight:500,marginBottom:4}}>{data[hover.i].label}</div>
      {series.slice().reverse().map(s=>{const v=data[hover.i].values[s.key]||0;if(!v)return null;return<div key={s.key} style={{display:"flex",alignItems:"center",gap:6,justifyContent:"space-between"}}><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:8,height:8,borderRadius:2,background:s.color}}></span>{s.label}</span><span style={{fontWeight:500,marginLeft:8}}>{v}</span></div>;})}
    </div>}
  </div>;
}

// ── Horizontal Bar Chart ──────────────────────────────────────
function DashHBar({ data }) {
  const max = Math.max(...data.map(d=>d.value),1);
  const rowH=46, labelW=160, H=data.length*rowH;
  return <svg viewBox={`0 0 860 ${H}`} style={{width:"100%",height:H,display:"block"}}>
    {data.map((d,i)=>{
      const y=i*rowH+4, trackX=labelW+8, trackW=860-labelW-60;
      const w=(d.value/max)*trackW;
      return <g key={i}>
        <text x={labelW} y={y+18} textAnchor="end" fontSize="13" fill="#161A18" fontFamily="Inter,system-ui" fontWeight="500">{d.label}</text>
        {d.sublabel&&<text x={labelW} y={y+32} textAnchor="end" fontSize="11" fill="#9AA3A1" fontFamily="Inter,system-ui">{d.sublabel}</text>}
        <rect x={trackX} y={y+6} width={trackW} height={22} rx={3} fill="#F5F7F6"/>
        <rect x={trackX} y={y+6} width={w} height={22} rx={3} fill="#207460"/>
        <text x={trackX+w+8} y={y+21} fontSize="13" fill="#161A18" fontFamily="Inter,system-ui" fontWeight="500">{d.value}</text>
      </g>;
    })}
  </svg>;
}

// Each card can be: small (1 col), medium (2 cols), large (3 cols)
const SIZE_OPTIONS = [
  { id:"small",  label:"S", cols:1, icon:"ri-layout-column-line",     title:"Small (1 column)" },
  { id:"medium", label:"M", cols:2, icon:"ri-layout-2-line",          title:"Medium (2 columns)" },

// ── Dropped report card (resizable, draggable, removable) ─────
function DroppedReportCard({ r, index, size, onRemove, onResize, onDragStart, onDragOver, onDrop, isDragOver }) {
  const [showControls, setShowControls] = useState(false);
  const tc = TYPE_COLORS[r.type]||{bg:"#EFF2F1",fg:"#525C59"};
  const colSpan = SIZE_OPTIONS.find(s=>s.id===size)?.cols || 1;

  return (
    <div
      draggable
      onDragStart={(e)=>onDragStart(e,index)}
      onDragOver={(e)=>onDragOver(e,index)}
      onDrop={(e)=>onDrop(e,index)}
      onMouseEnter={()=>setShowControls(true)}
      onMouseLeave={()=>setShowControls(false)}
      style={{
        gridColumn: `span ${colSpan}`,
        background:"#fff",
        border:`1.5px solid ${isDragOver?"#207460":"#E0E5E4"}`,
        borderRadius:12,
        boxShadow: isDragOver
          ? "0 0 0 3px rgba(32,116,96,0.15), 0 4px 16px rgba(10,13,20,0.08)"
          : "0 1px 3px rgba(10,13,20,0.05)",
        transition:"border-color 120ms, box-shadow 120ms, transform 80ms",
        cursor:"grab",
        position:"relative",
        overflow:"hidden",
        transform: isDragOver?"scale(1.01)":"scale(1)",
      }}
    >
      {/* Hover controls bar */}
      <div style={{
        position:"absolute", top:10, left:0, right:0,
        display:"flex", alignItems:"center", justifyContent:"space-between",
        padding:"0 12px",
        opacity: showControls?1:0,
        transition:"opacity 150ms",
        zIndex:3, pointerEvents: showControls?"all":"none",
      }}>
        {/* Drag handle */}
        <div style={{display:"flex",alignItems:"center",gap:4,color:"#9AA3A1",fontSize:13,cursor:"grab"}}>
          <i className="ri-draggable"></i>
        </div>

        {/* Size controls */}
        <div style={{display:"flex",alignItems:"center",gap:3,background:"#fff",border:"1px solid #E0E5E4",borderRadius:7,padding:"3px 4px",boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>
          {SIZE_OPTIONS.map(opt=>(
            <button key={opt.id} onClick={(e)=>{e.stopPropagation();onResize(index,opt.id);}}
              title={opt.title}
              style={{
                width:26,height:22,display:"grid",placeItems:"center",
                borderRadius:5,border:0,cursor:"pointer",
                background:size===opt.id?"#207460":"transparent",
                color:size===opt.id?"#fff":"#525C59",
                fontSize:13,transition:"all 120ms",
              }}>
              <span style={{fontSize:10,fontWeight:600}}>{opt.label}</span>
            </button>
          ))}
          <div style={{width:1,height:14,background:"#E0E5E4",margin:"0 2px"}}></div>
          {/* Remove */}
          <button onClick={(e)=>{e.stopPropagation();onRemove(index);}}
            style={{
              width:22,height:22,display:"grid",placeItems:"center",
              borderRadius:5,border:0,cursor:"pointer",
              background:"transparent",color:"#9AA3A1",fontSize:14,
            }}
            onMouseEnter={(e)=>{e.currentTarget.style.background="#FFEAEB";e.currentTarget.style.color="#DC455A";}}
            onMouseLeave={(e)=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color="#9AA3A1";}}
          >
            <i className="ri-close-line"></i>
          </button>
        </div>
      </div>

      {/* Chart preview */}
      <div style={{padding:"44px 18px 12px",background:"#FCFDFC",borderBottom:"1px solid #EFF2F1",minHeight:130}}>
        <ReportPreview r={r}/>
      </div>

      {/* Metadata */}
      <div style={{padding:"12px 16px 14px"}}>
        <div style={{fontFamily:"'Inter Display',Inter",fontWeight:500,fontSize:14,color:"#161A18",letterSpacing:"-0.005em",lineHeight:"20px",marginBottom:6}}>{r.name}</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{display:"inline-flex",padding:"2px 8px",borderRadius:4,background:tc.bg,color:tc.fg,fontSize:11,fontWeight:500}}>{r.type}</span>
          <span style={{fontSize:11,color:"#9AA3A1"}}>{r.updated} · {r.by}</span>
        </div>
      </div>
    </div>
  );
}

// ── Dashboard canvas (drag-to-reorder, resize) ────────────────
function DashboardCanvas({ cards, sizes, onReorder, onRemove, onResize, onDrop }) {
  const [dragFromIndex, setDragFromIndex] = useState(null);
  const [dragOverIndex, setDragOverIndex] = useState(null);

  const handleDragStart = (e, index) => {
    setDragFromIndex(index);
    e.dataTransfer.effectAllowed="move";
    e.dataTransfer.setData("canvasIndex", String(index));
  };
  const handleDragOver = (e, index) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = dragFromIndex!==null?"move":"copy";
    setDragOverIndex(index);
  };
  const handleDrop = (e, index) => {
    e.preventDefault();
    const canvasIdx = e.dataTransfer.getData("canvasIndex");
    const reportId  = e.dataTransfer.getData("reportId");
    if (canvasIdx!==""&&dragFromIndex!==null) {
      onReorder(parseInt(canvasIdx), index);
    } else if (reportId) {
      onDrop(reportId, index);
    }
    setDragFromIndex(null);
    setDragOverIndex(null);
  };
  const handleDragEnd = () => { setDragFromIndex(null); setDragOverIndex(null); };

  return (
    <div
      onDragOver={(e)=>e.preventDefault()}
      onDrop={(e)=>{
        e.preventDefault();
        const id=e.dataTransfer.getData("reportId");
        if(id) onDrop(id,cards.length);
        setDragOverIndex(null);
      }}
      style={{flex:1,padding:"28px 28px 60px",background:"#F5F7F6",minHeight:"100%"}}
    >
      {cards.length===0 ? (
        <div style={{
          minHeight:200, border:"2px dashed #C4CBCA", borderRadius:12,
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          gap:12,background:"rgba(255,255,255,0.5)",padding:"48px 24px",
        }}>
          <div style={{width:48,height:48,borderRadius:12,background:"#EBF5F2",color:"#1A6251",display:"grid",placeItems:"center",fontSize:22}}>
            <i className="ri-drag-drop-line"></i>
          </div>
          <div style={{fontSize:14,fontWeight:500,color:"#525C59"}}>Drag reports here</div>
          <div style={{fontSize:12,color:"#9AA3A1"}}>Or click + on any report in the panel</div>
        </div>
      ) : (
        <div style={{
          display:"grid",
          gridTemplateColumns:"repeat(3, 1fr)",
          gap:16,
          alignItems:"start",
        }}>
          {cards.map((r,i)=>(
            <DroppedReportCard
              key={r.id+i}
              r={r} index={i}
              size={sizes[i]||"small"}
              onRemove={onRemove}
              onResize={onResize}
              onDragStart={handleDragStart}
              onDragOver={handleDragOver}
              onDrop={handleDrop}
              isDragOver={dragOverIndex===i&&dragFromIndex!==i}
            />
          ))}
          {/* Drop slot at end */}
          <div
            onDragOver={(e)=>{e.preventDefault();setDragOverIndex(cards.length);}}
            onDrop={(e)=>{
              e.preventDefault();
              const id=e.dataTransfer.getData("reportId");
              if(id) onDrop(id,cards.length);
              setDragOverIndex(null);
            }}
            style={{
              border:`2px dashed ${dragOverIndex===cards.length?"#207460":"#C4CBCA"}`,
              borderRadius:12, minHeight:160,
              display:"flex",alignItems:"center",justifyContent:"center",
              color: dragOverIndex===cards.length?"#207460":"#C4CBCA",
              background: dragOverIndex===cards.length?"#EBF5F2":"transparent",
              fontSize:13, fontWeight:500, cursor:"pointer", transition:"all 120ms",
            }}
          >
            <span style={{display:"flex",alignItems:"center",gap:6}}>
              <i className="ri-add-line" style={{fontSize:18}}></i>Drop here
            </span>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Full empty dashboard screen ───────────────────────────────
function ScreenDashboardEmpty({ name, navigate }) {
  const [cards, setCards] = useState([]);
  // sizes: array of "small"|"medium"|"large" parallel to cards
  const [sizes, setSizes] = useState([]);

  const addedIds = cards.map(r=>r.id);

  const handleAdd = (r) => {
    if (!addedIds.includes(r.id)) {
      setCards(prev=>[...prev,r]);
      setSizes(prev=>[...prev,"small"]);
    }
  };
  const handleRemove = (index) => {
    setCards(prev=>prev.filter((_,i)=>i!==index));
    setSizes(prev=>prev.filter((_,i)=>i!==index));
  };
  const handleReorder = (fromIdx, toIdx) => {
    if(fromIdx===toIdx) return;
    setCards(prev=>{
      const next=[...prev]; const [m]=next.splice(fromIdx,1); next.splice(toIdx,0,m); return next;
    });
    setSizes(prev=>{
      const next=[...prev]; const [m]=next.splice(fromIdx,1); next.splice(toIdx,0,m); return next;
    });
  };
  const handleDrop = (reportId, slotIndex) => {
    const r=A_REPORTS.find(r=>r.id===reportId);
    if(!r||addedIds.includes(r.id)) return;
    setCards(prev=>{ const next=[...prev]; next.splice(slotIndex,0,r); return next; });
    setSizes(prev=>{ const next=[...prev]; next.splice(slotIndex,0,"small"); return next; });
  };
  const handleResize = (index, newSize) => {
    setSizes(prev=>prev.map((s,i)=>i===index?newSize:s));
  };

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}}>
      {/* Topbar */}
      <div style={{background:"#fff",borderBottom:"1px solid #E0E5E4",padding:"0 24px",height:48,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:6,fontSize:13,color:"#525C59"}}>
          <span style={{cursor:"pointer"}} onClick={()=>navigate("reports")}>Analytics</span>
          <i className="ri-arrow-right-s-line" style={{color:"#C4CBCA",fontSize:14}}></i>
          <span style={{cursor:"pointer"}} onClick={()=>navigate("dashboards")}>Dashboards</span>
          <i className="ri-arrow-right-s-line" style={{color:"#C4CBCA",fontSize:14}}></i>
          <span style={{color:"#161A18",fontWeight:500}}>{name||"New Dashboard"}</span>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <Button variant="ghost" size="sm" onClick={()=>navigate("dashboards")}>Discard</Button>
          <Button variant="primary" size="sm" icon="ri-check-line"
            disabled={cards.length===0}
            onClick={()=>navigate("dashboard-canvas")}
          >Save dashboard</Button>
        </div>
      </div>

      {/* Dashboard name + hint */}
      <div style={{padding:"16px 24px 14px",background:"#fff",borderBottom:"1px solid #EFF2F1",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <h1 style={{fontFamily:"'Inter Display',Inter",fontSize:20,fontWeight:500,color:"#161A18",letterSpacing:"-0.01em",margin:0}}>{name||"New Dashboard"}</h1>
          <i className="ri-pencil-line" style={{fontSize:14,color:"#C4CBCA",cursor:"pointer"}}></i>
        </div>
        <div style={{fontSize:12,color:"#9AA3A1",marginTop:4}}>
          {cards.length===0
            ? "Drag reports from the right panel to build your dashboard."
            : `${cards.length} report${cards.length!==1?"s":""} added · hover a card to resize or remove · drag to reorder`}
        </div>
      </div>

      {/* Canvas + rail */}
      <div style={{flex:1,display:"flex",minHeight:0,overflow:"hidden"}}>
        <div style={{flex:1,overflowY:"auto"}}>
          <DashboardCanvas
            cards={cards} sizes={sizes}
            onReorder={handleReorder}
            onRemove={handleRemove}
            onResize={handleResize}
            onDrop={handleDrop}
          />
        </div>
        <ReportPickerRail addedIds={addedIds} onAdd={handleAdd}/>
      </div>
    </div>
  );
}


// ─── ROOT APP ─────────────────────────────────────────────────
// Hash scheme:
//   #reports            → Combined view (dashboards + reports)
//   #reports-only       → Reports tab selected (reports grid only)
//   #dashboards         → Dashboards tab selected (dashboards grid only)
//   #empty              → Empty state
//   #templates          → Template library, population tab
//   #templates-spend    → Template library, spend tab
//   #templates-outcomes → Template library, outcomes tab
//   #templates-timelines→ Template library, timelines tab
//   #templates-vendor   → Template library, vendor tab
//   #new-dashboard      → New dashboard modal
//   #dashboard-canvas   → Populated dashboard view
//   #dashboard-empty    → Empty dashboard view

function parseRoute() {
  const h = window.location.hash.replace("#","");
  if (!h || h==="reports") return {screen:"reports", cat:null};
  if (h==="reports-only")  return {screen:"reports-only", cat:null};
  if (h==="dashboards")    return {screen:"dashboards", cat:null};
  if (h==="empty")         return {screen:"empty", cat:null};
  if (h==="new-dashboard") return {screen:"new-dashboard", cat:null};
  if (h==="dashboard-canvas") return {screen:"dashboard-canvas", cat:null};
  if (h==="dashboard-empty")  return {screen:"dashboard-empty",  cat:null};
  if (h==="builder")       return {screen:"builder", cat:null};
  if (h.startsWith("templates")) {
    const cat = h.replace("templates-","").replace("templates","") || "population";
    const valid = ["population","spend","outcomes","timelines","vendor"];
    return {screen:"templates", cat:valid.includes(cat)?cat:"population"};
  }
  return {screen:"reports", cat:null};
}

// Determines which analytics nav item should appear active
function getNavActive(screen) {
  if (screen==="reports"||screen==="empty") return "reports";
  if (screen==="reports-only"||screen==="mine"||screen==="shared"||screen==="favorites"||screen==="trash") return "reports-only";
  if (screen==="dashboards"||screen==="dashboard-canvas"||screen==="dashboard-empty") return "dashboards";
  if (screen==="templates"||screen.startsWith("templates-")) return "templates";
  if (screen==="new-dashboard") return "dashboards";
  return "reports";
}

const SCREEN_LABELS = {
  "reports":          "Analytics — Home",
  "reports-only":     "Analytics — Reports",
  "dashboards":       "Analytics — Dashboards",
  "empty":            "Analytics — Empty",
  "templates":        "Template Library",
  "new-dashboard":    "New Dashboard Modal",
  "dashboard-canvas": "Dashboard Canvas",
  "dashboard-empty":  "Dashboard Empty",
};

function ScreenPicker({ current, onPick }) {
  const [open, setOpen] = useState(false);
  const screens = Object.entries(SCREEN_LABELS);
  const label = SCREEN_LABELS[current] || current;
  return <div style={{position:"fixed",bottom:16,left:"50%",transform:"translateX(-50%)",zIndex:100,fontFamily:"Inter,system-ui"}}>
    {open&&<div style={{position:"absolute",bottom:"calc(100% + 8px)",left:"50%",transform:"translateX(-50%)",background:"#161A18",borderRadius:12,padding:6,boxShadow:"0 8px 32px rgba(0,0,0,0.24)",minWidth:240}}>
      {screens.map(([id,lbl])=><button key={id} onClick={()=>{onPick(id);setOpen(false);}} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"8px 12px",borderRadius:7,background:current===id?"rgba(255,255,255,0.12)":"transparent",border:0,color:current===id?"#fff":"#C4CBCA",cursor:"pointer",fontSize:13,fontWeight:500,textAlign:"left"}}>
        {current===id?<i className="ri-check-line" style={{fontSize:13,color:"#76C08D"}}></i>:<span style={{width:13}}></span>}
        {lbl}
      </button>)}
    </div>}
    <button onClick={()=>setOpen(!open)} style={{display:"inline-flex",alignItems:"center",gap:8,padding:"8px 16px",background:"#161A18",border:0,borderRadius:999,color:"#fff",cursor:"pointer",fontSize:13,fontWeight:500,boxShadow:"0 4px 16px rgba(0,0,0,0.2)"}}>
      <i className="ri-layouts-line" style={{fontSize:14,color:"#9AA3A1"}}></i>
      {label}
      <i className={`ri-arrow-${open?"down":"up"}-s-line`} style={{fontSize:14,color:"#9AA3A1"}}></i>
    </button>
  </div>;
}

function App() {
  const initial = parseRoute();
  const [route, setRoute] = useState(initial);
  const [newDashName, setNewDashName] = useState("");

  const navigate = (screen, cat) => {
    let hash = screen;
    if (screen==="templates") hash = cat ? `templates-${cat}` : "templates";
    window.location.hash = hash;
    setRoute({screen, cat: cat||(screen==="templates"?"population":null)});
  };

  useEffect(()=>{
    const h = ()=>{ const r=parseRoute(); setRoute(r); };
    window.addEventListener("hashchange",h);
    return ()=>window.removeEventListener("hashchange",h);
  },[]);

  const navActive = getNavActive(route.screen);

  const handleNavClick = (key) => {
    if (key==="reports")         navigate("reports");
    else if (key==="reports-only") navigate("reports-only");
    else if (key==="dashboards")   navigate("dashboards");
    else if (key==="templates")    navigate("templates","population");
    else if (["mine","shared","favorites","trash"].includes(key)) navigate("reports-only");
    else if (key.startsWith("f-")) navigate("dashboard-canvas");
    else navigate("reports");
  };

  return <div style={{display:"flex",minHeight:"100vh",background:"#FCFDFC"}}>
    <Sidebar activeKey="analytics" onNavigate={()=>{}}/>
    <AnalyticsNav active={navActive} onNavigate={handleNavClick}/>
    <div style={{flex:1,display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden",position:"relative"}}>
      {route.screen==="reports"          && <ScreenD navigate={navigate}/>}
      {route.screen==="reports-only"     && <ScreenReports navigate={navigate}/>}
      {route.screen==="dashboards"       && <ScreenDashboardsGrid navigate={navigate}/>}
      {route.screen==="empty"            && <ScreenE navigate={navigate}/>}
      {route.screen==="templates"        && <ScreenF navigate={navigate} activeCat={route.cat||"population"} onCatChange={(cat)=>navigate("templates",cat)}/>}
      {route.screen==="dashboard-canvas" && <ScreenDashboard name={newDashName||"Immigration MBR"} navigate={navigate}/>}
      {route.screen==="dashboard-empty"  && <ScreenDashboardEmpty name={newDashName||"New Dashboard"} navigate={navigate}/>}
      {route.screen==="builder" && <div style={{flex:1,display:"grid",placeItems:"center",background:"#FCFDFC"}}>
        <div style={{textAlign:"center",color:"#9AA3A1"}}>
          <i className="ri-arrow-left-circle-line" style={{fontSize:48,marginBottom:12,display:"block",color:"#C4CBCA"}}></i>
          <div style={{fontSize:14,fontWeight:500,color:"#525C59"}}>Report Builder lives in a separate file</div>
          <div style={{fontSize:12,marginTop:4,color:"#9AA3A1"}}>Open ReportBuilder.html to continue</div>
          <button onClick={()=>navigate("reports")} style={{marginTop:16,padding:"8px 16px",background:"#207460",color:"#fff",border:0,borderRadius:8,fontSize:13,fontWeight:500,cursor:"pointer"}}>← Back to Analytics</button>
        </div>
      </div>}
      {route.screen==="new-dashboard" && <>
        <ScreenD navigate={(s)=>{ if(s!=="new-dashboard") navigate(s); }}/>
        <NewDashboardModal
          onClose={()=>navigate("reports")}
          onCreate={(name)=>{ setNewDashName(name); navigate("dashboard-empty"); }}
        />
      </>}
    </div>
    <ScreenPicker current={route.screen} onPick={(id)=>{ if(id.startsWith("templates-")){const cat=id.replace("templates-","");navigate("templates",cat);}else navigate(id); }}/>
  </div>;
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
