<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Report Builder — Screen Canvas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Display:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Inter",system-ui,sans-serif;background:#ECEAE7;color:#161A18;-webkit-font-smoothing:antialiased;}
button{font-family:inherit;}
*::-webkit-scrollbar{width:8px;height:8px;}
*::-webkit-scrollbar-thumb{background:#D5DBDA;border-radius:999px;border:2px solid transparent;background-clip:content-box;}
*::-webkit-scrollbar-track{background:transparent;}

/* ── Canvas layout ── */
.canvas { padding: 56px 64px 120px; display:flex; flex-direction:column; gap:80px; }

/* ── Section ── */
.section { display:flex; flex-direction:column; gap:20px; }
.section-num { font-size:11px; font-weight:500; color:#9AA3A1; letter-spacing:0.08em; text-transform:uppercase; }
.section-title { font-family:"Inter Display",Inter; font-size:22px; font-weight:500; color:#161A18; letter-spacing:-0.01em; }
.section-desc { font-size:13px; color:#525C59; line-height:1.5; margin-top:2px; }

/* ── Frame wrapper ── */
.frames-row { display:flex; gap:24px; align-items:flex-start; flex-wrap:wrap; }
.frame-wrap { display:flex; flex-direction:column; gap:10px; flex-shrink:0; }
.frame-label { display:flex; align-items:center; gap:8px; }
.frame-num { font-size:10px; font-weight:600; color:#9AA3A1; letter-spacing:0.04em; }
.frame-name { font-size:12px; font-weight:500; color:#525C59; }

/* ── Each frame is a scaled-down browser chrome ── */
.frame {
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  border:1px solid #D5DBDA;
  box-shadow:0 2px 8px rgba(10,13,20,0.08), 0 1px 2px rgba(10,13,20,0.04);
  position:relative;
  transform-origin: top left;
}

/* Frames are rendered at full size inside a scaled container */
.frame-scaler {
  transform-origin: top left;
  overflow:hidden;
  border-radius:10px;
  border:1px solid #D5DBDA;
  box-shadow:0 2px 8px rgba(10,13,20,0.08), 0 1px 2px rgba(10,13,20,0.04);
}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// ─── DESIGN TOKENS ────────────────────────────────────────────
const SERIES = [
  "#207460","#4D9A88","#13673E","#7AB5A6",
  "#D29E00","#B87428","#048AF5","#966EEE","#A8D0C5","#525C59",
];
const fmtUSD  = (n) => "$" + Math.round(n).toLocaleString("en-US");
const fmtUSDk = (n) => Math.abs(n)>=1000 ? "$"+(n/1000).toFixed(n>=10000?0:1)+"k" : "$"+n;

// ─── ATOMS ────────────────────────────────────────────────────
function Button({ children, variant="primary", size="md", icon, iconRight, onClick, disabled, style }) {
  const base = {
    display:"inline-flex", alignItems:"center", gap:6,
    fontFamily:"Inter, system-ui", fontWeight:500,
    fontSize: size==="sm" ? 13 : 14,
    padding: size==="sm" ? "5px 10px" : "8px 14px",
    borderRadius:8, border:"1px solid transparent",
    cursor: disabled ? "not-allowed" : "pointer",
    whiteSpace:"nowrap", transition:"background 120ms",
    opacity: disabled ? 0.5 : 1,
  };
  const variants = {
    primary:   { background:"#207460", color:"#fff" },
    secondary: { background:"#fff", color:"#161A18", borderColor:"#E0E5E4" },
    ghost:     { background:"transparent", color:"#525C59" },
    danger:    { background:"#E55767", color:"#fff" },
  };
  return (
    <button onClick={!disabled ? onClick : undefined} disabled={disabled}
      style={{ ...base, ...variants[variant], ...style }}
      onMouseEnter={(e)=>{
        if(disabled) return;
        if(variant==="primary") e.currentTarget.style.background="#155042";
        if(variant==="secondary") e.currentTarget.style.background="#F5F7F6";
        if(variant==="ghost"){ e.currentTarget.style.background="#F5F7F6"; e.currentTarget.style.color="#161A18"; }
      }}
      onMouseLeave={(e)=>{ if(!disabled) Object.assign(e.currentTarget.style, variants[variant]); }}>
      {icon && <i className={icon}></i>}
      {children}
      {iconRight && <i className={iconRight}></i>}
    </button>
  );
}

function Badge({ children, tone="neutral", dot=false, style }) {
  const tones = {
    success: { bg:"#E2F6E6", fg:"#2E744C", border:"#C4EACC" },
    warning: { bg:"#FEF2E6", fg:"#B87428", border:"#FCE6CF" },
    danger:  { bg:"#FFEAEB", fg:"#DC455A", border:"#FFE0E1" },
    info:    { bg:"#E1F3FF", fg:"#007CE9", border:"#D1EDFF" },
    neutral: { bg:"#EFF2F1", fg:"#313836", border:"#E0E5E4" },
    brand:   { bg:"#EBF5F2", fg:"#1A6251", border:"#D4E8E2" },
  };
  const t = tones[tone]||tones.neutral;
  return (
    <span style={{
      display:"inline-flex", alignItems:"center", gap:4,
      padding:"3px 8px", borderRadius:6, fontSize:12, fontWeight:500,
      background:t.bg, color:t.fg, border:`1px solid ${t.border}`,
      fontFamily:"Inter, system-ui", ...style,
    }}>
      {dot && <span style={{ width:6, height:6, borderRadius:999, background:t.fg }}></span>}
      {children}
    </span>
  );
}

function Avatar({ initials, size=32, tone="sage", status }) {
  const tones = {
    sage:{ bg:"#D4E8E2", fg:"#155042" },
    honey:{ bg:"#FCE6CF", fg:"#7A4C18" },
    gray:{ bg:"#E0E5E4", fg:"#313836" },
  };
  const t = tones[tone]||tones.sage;
  return (
    <div style={{ position:"relative", width:size, height:size, flex:`0 0 ${size}px` }}>
      <div style={{
        width:size, height:size, borderRadius:999,
        background:t.bg, color:t.fg,
        display:"grid", placeItems:"center",
        fontWeight:500, fontSize:Math.round(size*0.38),
      }}>{initials}</div>
      {status && (
        <span style={{
          position:"absolute", right:-1, bottom:-1,
          width:Math.max(8,size*0.28), height:Math.max(8,size*0.28),
          borderRadius:999, background:"#2E744C", border:"2px solid #fff",
        }}></span>
      )}
    </div>
  );
}

function NavItem({ icon, label, active, onClick, hasChevron }) {
  const [hover, setHover] = useState(false);
  return (
    <div onClick={onClick}
      onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{
        display:"flex", alignItems:"center", gap:10,
        height:34, padding:"0 12px", borderRadius:8, cursor:"pointer",
        background: active?"#E0E5E4":(hover?"#EFF2F1":"transparent"),
        color: active?"#161A18":(hover?"#161A18":"#525C59"),
        fontWeight:500, fontSize:14, letterSpacing:"-0.006em",
        userSelect:"none",
      }}>
      <i className={icon} style={{ fontSize:16, color:active?"#1A6251":"#9AA3A1" }}></i>
      <span style={{ flex:1 }}>{label}</span>
      {hasChevron && <i className="ri-arrow-right-s-line" style={{ fontSize:16, color:"#9AA3A1" }}></i>}
    </div>
  );
}

function AccountRow({ label, active, dot="#9AA3A1" }) {
  return (
    <div style={{ position:"relative" }}>
      {active && <span style={{ position:"absolute", left:-12, top:4, bottom:4, width:3, borderRadius:"0 3px 3px 0", background:"#207460" }}></span>}
      <div style={{
        display:"flex", alignItems:"center", gap:10,
        height:30, padding:"0 12px", borderRadius:8, cursor:"pointer",
        fontSize:13, color:"#161A18", fontWeight:active?500:400,
        background:active?"#E0E5E4":"transparent",
      }}>
        <span style={{ width:6, height:6, borderRadius:999, background:active?"#207460":dot }}></span>
        <span style={{ flex:1 }}>{label}</span>
        {active && <i className="ri-check-line" style={{ color:"#207460" }}></i>}
      </div>
    </div>
  );
}

// ─── SIDEBAR (icon-only collapsed) ──────────────────────────
function Sidebar({ activeKey, onNavigate }) {
  const items = [
    {key:"dashboard",     icon:"ri-dashboard-line"},
    {key:"beneficiaries", icon:"ri-user-3-line"},
    {key:"cases",         icon:"ri-briefcase-line"},
    {key:"petitioners",   icon:"ri-bank-line"},
    {key:"analytics",     icon:"ri-bar-chart-2-line"},
    {key:"questionnaires",icon:"ri-questionnaire-line"},
    {key:"billing",       icon:"ri-bill-line"},
  ];
  return (
    <aside style={{
      width:56, height:"100vh", background:"#F5F7F6",
      borderRight:"1px solid #E0E5E4",
      display:"flex", flexDirection:"column", alignItems:"center",
      flex:"0 0 56px", position:"sticky", top:0,
    }}>
      {/* Logo */}
      <div style={{ width:56, height:56, display:"grid", placeItems:"center", flexShrink:0 }}>
        <div style={{ width:30, height:30, borderRadius:8, background:"#207460",
          display:"grid", placeItems:"center" }}>
          <i className="ri-leaf-line" style={{ fontSize:16, color:"#fff" }}></i>
        </div>
      </div>
      {/* Nav icons */}
      <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center",
        gap:2, padding:"4px 6px", width:"100%" }}>
        {items.map(it => {
          const isActive = activeKey===it.key;
          return (
            <button key={it.key} onClick={()=>onNavigate&&onNavigate(it.key)}
              style={{
                width:40, height:36, display:"grid", placeItems:"center",
                borderRadius:8, border:0, cursor:"pointer",
                background:isActive?"#E0E5E4":"transparent",
                color:isActive?"#1A6251":"#9AA3A1",
                fontSize:18, transition:"all 120ms",
              }}
              onMouseEnter={(e)=>{ if(!isActive){ e.currentTarget.style.background="#EFF2F1"; e.currentTarget.style.color="#525C59"; }}}
              onMouseLeave={(e)=>{ if(!isActive){ e.currentTarget.style.background="transparent"; e.currentTarget.style.color="#9AA3A1"; }}}>
              <i className={it.icon}></i>
            </button>
          );
        })}
      </div>
      {/* Bottom */}
      <div style={{ padding:"8px 6px 12px", display:"flex", flexDirection:"column",
        alignItems:"center", gap:6, borderTop:"1px solid #E0E5E4", width:"100%" }}>
        <button style={{ width:40, height:36, display:"grid", placeItems:"center",
          borderRadius:8, border:0, cursor:"pointer", background:"transparent",
          color:"#9AA3A1", fontSize:18 }}
          onMouseEnter={(e)=>e.currentTarget.style.background="#EFF2F1"}
          onMouseLeave={(e)=>e.currentTarget.style.background="transparent"}>
          <i className="ri-settings-3-line"></i>
        </button>
        <div style={{ width:32, height:32, borderRadius:999, background:"#FCE6CF",
          color:"#7A4C18", display:"grid", placeItems:"center",
          fontSize:12, fontWeight:600, cursor:"pointer" }}>AT</div>
      </div>
    </aside>
  );
}

// ─── FLOW STEP INDICATOR (3 steps — Subject removed) ────────
function FlowSteps({ step, setStep }) {
  const steps = [
    { id:"g", n:1, label:"Type" },
    { id:"i", n:2, label:"Configure" },
    { id:"j", n:3, label:"Preview" },
  ];
  return (
    <div style={{
      display:"inline-flex", alignItems:"center",
      padding:3, background:"#F5F7F6",
      border:"1px solid #E0E5E4", borderRadius:8, gap:2,
    }}>
      {steps.map(s => {
        const active = step===s.id;
        const done = ["g","i","j"].indexOf(s.id) < ["g","i","j"].indexOf(step);
        return (
          <button key={s.id} onClick={()=>setStep(s.id)} style={{
            display:"inline-flex", alignItems:"center", gap:6,
            height:26, padding:"0 10px",
            background:active?"#fff":"transparent",
            border:`1px solid ${active?"#E0E5E4":"transparent"}`,
            borderRadius:6, cursor:"pointer",
            fontSize:12, fontWeight:500,
            color:active?"#161A18":"#525C59",
            boxShadow:active?"0 1px 2px rgba(10,13,20,0.04)":"none",
            transition:"all 120ms",
          }}>
            <span style={{
              width:16, height:16, borderRadius:999,
              display:"grid", placeItems:"center",
              background:active?"#207460":(done?"#76C08D":"#D5DBDA"),
              color:"#fff", fontSize:10, fontWeight:600,
            }}>
              {done ? <i className="ri-check-line" style={{ fontSize:10 }}></i> : s.n}
            </span>
            {s.label}
          </button>
        );
      })}
    </div>
  );
}

// ─── TOP BAR ──────────────────────────────────────────────────
function FlowTopBar({ step, setStep, name, setName, canSave, onSave }) {
  const [editing, setEditing] = useState(false);
  const showName = step==="i"||step==="j";

  return (
    <div style={{
      height:56, flex:"0 0 56px",
      borderBottom:"1px solid #E0E5E4",
      background:"#fff",
      display:"flex", alignItems:"center", padding:"0 20px",
      gap:16, position:"sticky", top:0, zIndex:20,
    }}>
      {/* Left */}
      <div style={{ display:"flex", alignItems:"center", gap:12, flex:"0 0 auto" }}>
        <button onClick={()=>{ const prev={i:"g",j:"i"}[step]; if(prev) setStep(prev); }}
          style={{
            width:32, height:32, display:"grid", placeItems:"center",
            background:"transparent", border:"1px solid #E0E5E4",
            borderRadius:8, cursor:"pointer", color:"#525C59",
          }}>
          <i className="ri-arrow-left-line" style={{ fontSize:16 }}></i>
        </button>
        <div style={{ display:"flex", alignItems:"center", gap:6, fontSize:13, color:"#525C59" }}>
          <span style={{ cursor:"pointer" }}>Analytics</span>
          <i className="ri-arrow-right-s-line" style={{ fontSize:14, color:"#9AA3A1" }}></i>
          <span style={{ color:"#161A18", fontWeight:500 }}>New Report</span>
        </div>
      </div>

      {/* Center */}
      <div style={{ flex:1, display:"flex", justifyContent:"center", alignItems:"center", gap:16 }}>
        <FlowSteps step={step} setStep={setStep} />
        {showName && (
          <div
            onClick={()=>setEditing(true)}
            style={{
              display:"inline-flex", alignItems:"center", gap:8,
              padding:"6px 12px",
              border:`1px solid ${editing?"#A8D0C5":"transparent"}`,
              background:editing?"#fff":"transparent",
              borderRadius:8, cursor:"text", maxWidth:380,
              transition:"all 120ms",
            }}
            onMouseEnter={(e)=>{ if(!editing) e.currentTarget.style.background="#F5F7F6"; }}
            onMouseLeave={(e)=>{ if(!editing) e.currentTarget.style.background="transparent"; }}
          >
            {editing ? (
              <input autoFocus value={name}
                onChange={(e)=>setName(e.target.value)}
                onBlur={()=>setEditing(false)}
                onKeyDown={(e)=>{ if(e.key==="Enter") setEditing(false); }}
                placeholder="Untitled report"
                style={{
                  background:"transparent", border:0, outline:"none",
                  fontFamily:"'Inter Display', Inter",
                  fontSize:14, fontWeight:500, color:"#161A18",
                  letterSpacing:"-0.006em", width:320,
                }} />
            ) : (
              <span style={{
                fontFamily:"'Inter Display', Inter",
                fontSize:14, fontWeight:500,
                color:name?"#161A18":"#9AA3A1",
                letterSpacing:"-0.006em",
                whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
              }}>{name||"Untitled report"}</span>
            )}
            <i className="ri-pencil-line" style={{ color:"#9AA3A1", fontSize:14 }}></i>
          </div>
        )}
      </div>

      {/* Right */}
      <div style={{ display:"flex", alignItems:"center", gap:6, flex:"0 0 auto" }}>
        {step==="g" && (
          <button style={{
            height:32, padding:"0 12px", background:"transparent", border:0,
            fontSize:13, fontWeight:500, color:"#525C59", cursor:"pointer",
            display:"inline-flex", alignItems:"center", gap:6,
          }}>
            <i className="ri-close-line" style={{ fontSize:14 }}></i> Exit
          </button>
        )}
        {(step==="i"||step==="j") && (
          <>
            <button title="Undo" style={{
              width:32, height:32, display:"grid", placeItems:"center",
              background:"transparent", border:"1px solid #E0E5E4",
              borderRadius:8, cursor:"pointer", color:"#525C59",
            }}><i className="ri-arrow-go-back-line" style={{ fontSize:16 }}></i></button>
            <button title="Redo" style={{
              width:32, height:32, display:"grid", placeItems:"center",
              background:"transparent", border:"1px solid #E0E5E4",
              borderRadius:8, cursor:"pointer", color:"#525C59",
            }}><i className="ri-arrow-go-forward-line" style={{ fontSize:16 }}></i></button>
            <span style={{ width:1, height:20, background:"#E0E5E4", margin:"0 6px" }}></span>
            <button style={{
              height:32, padding:"0 12px", background:"transparent", border:0,
              fontSize:13, fontWeight:500, color:"#525C59", cursor:"pointer",
              display:"inline-flex", alignItems:"center", gap:6,
            }}>
              <i className="ri-stack-line" style={{ fontSize:14 }}></i> Sample reports
            </button>
            <button
              onClick={canSave ? onSave : undefined}
              style={{
                display:"inline-flex", alignItems:"center", gap:6,
                fontFamily:"Inter, system-ui", fontWeight:500,
                fontSize:14, padding:"8px 14px",
                borderRadius:8, border:0,
                background:canSave?"#207460":"#EFF2F1",
                color:canSave?"#fff":"#9AA3A1",
                cursor:canSave?"pointer":"not-allowed",
              }}>
              <i className="ri-save-line"></i> Save report
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ─── CHARTS ───────────────────────────────────────────────────
function StackedBarOverTime({ data, series, height=280 }) {
  const [hover, setHover] = useState(null);
  const W=880, H=height, padL=44, padR=16, padT=14, padB=28;
  const innerW=W-padL-padR, innerH=H-padT-padB;
  const totals = data.map(d=>series.reduce((s,k)=>s+(d.values[k.key]||0),0));
  const maxRaw = Math.max(...totals,1);
  const pow = Math.pow(10,Math.floor(Math.log10(maxRaw)));
  const n = maxRaw/pow;
  const max = (n<=1?1:n<=2?2:n<=5?5:10)*pow;
  const barW = innerW/data.length*0.62;
  const xC = (i)=>padL+(innerW/data.length)*(i+0.5);
  const yS = (v)=>padT+innerH-(v/max)*innerH;

  return (
    <div style={{ position:"relative", width:"100%" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", height:H, display:"block", overflow:"visible" }}>
        {Array.from({length:6},(_,i)=>{
          const v=(max/5)*i, y=yS(v);
          return <g key={i}>
            <line x1={padL} x2={W-padR} y1={y} y2={y} stroke={i===0?"#C4CBCA":"#EFF2F1"} strokeWidth="1"/>
            <text x={padL-8} y={y+4} fontSize="11" fill="#767F7D" textAnchor="end" fontFamily="Inter, system-ui">{v}</text>
          </g>;
        })}
        {data.map((d,i)=>{
          let acc=0;
          const cx=xC(i);
          return <g key={i} onMouseEnter={()=>setHover({i})} onMouseLeave={()=>setHover(null)}>
            <rect x={cx-innerW/data.length/2} y={padT} width={innerW/data.length} height={innerH} fill="transparent"/>
            {series.map((s,si)=>{
              const v=d.values[s.key]||0;
              if(!v) return null;
              const h=(v/max)*innerH, y=yS(acc+v);
              acc+=v;
              const isFirst=si===0||series.slice(0,si).every(ss=>!d.values[ss.key]);
              return <rect key={s.key} x={cx-barW/2} y={y} width={barW} height={h}
                fill={s.color} rx={isFirst?4:0} ry={isFirst?4:0}
                opacity={hover&&hover.i!==i?0.32:1}/>;
            })}
            {totals[i]>0&&<text x={cx} y={yS(totals[i])-6} fontSize="11" fill="#313836" textAnchor="middle" fontFamily="Inter, system-ui" fontWeight="500">{totals[i]}</text>}
            <text x={cx} y={H-8} fontSize="11" fill="#767F7D" textAnchor="middle" fontFamily="Inter, system-ui">{d.label}</text>
          </g>;
        })}
      </svg>
      {hover&&(
        <div style={{
          position:"absolute", top:0,
          left:`${(xC(hover.i)/W)*100}%`,
          transform:"translate(-50%,-100%)",
          background:"#161A18", color:"#fff", padding:"8px 10px",
          borderRadius:8, fontSize:12, minWidth:160,
          boxShadow:"0 8px 24px rgba(0,0,0,0.16)", pointerEvents:"none",
        }}>
          <div style={{ fontWeight:500, marginBottom:4 }}>{data[hover.i].label}</div>
          {series.slice().reverse().map(s=>{
            const v=data[hover.i].values[s.key]||0;
            if(!v) return null;
            return <div key={s.key} style={{ display:"flex", alignItems:"center", gap:6, justifyContent:"space-between" }}>
              <span style={{ display:"flex", alignItems:"center", gap:6 }}>
                <span style={{ width:8, height:8, borderRadius:2, background:s.color }}></span>{s.label}
              </span>
              <span style={{ fontWeight:500, marginLeft:12 }}>{v}</span>
            </div>;
          })}
        </div>
      )}
    </div>
  );
}

function HorizontalBars({ data, formatValue=v=>v, accent="#207460" }) {
  const max = Math.max(...data.map(d=>d.value),1);
  const rowH=38, labelW=200, valueW=56, H=data.length*rowH+8;
  return (
    <svg viewBox={`0 0 880 ${H}`} style={{ width:"100%", height:H, display:"block" }}>
      {data.map((d,i)=>{
        const y=i*rowH+4, trackX=labelW+4, trackW=880-labelW-valueW-12, w=(d.value/max)*trackW;
        return <g key={i}>
          <text x={labelW-12} y={y+22} textAnchor="end" fontSize="13" fill="#161A18" fontFamily="Inter, system-ui" fontWeight="500">{d.label}</text>
          {d.sublabel&&<text x={labelW-12} y={y+34} textAnchor="end" fontSize="11" fill="#767F7D" fontFamily="Inter, system-ui">{d.sublabel}</text>}

        </g>;
      })}
    </svg>
  );
}

function ScreenG_Preview({ type }) {
  const colors=["#207460","#4D9A88","#7AB5A6","#A8D0C5","#D88F4E","#F2BA77"];
  if(type==="count-over-time"){
    const pts=[12,18,14,22,28,26,34,38,32,44,40,52];
    const W=480,H=200,pad=16,max=Math.max(...pts);
    const x=(i)=>pad+(i/(pts.length-1))*(W-pad*2);
    const y=(v)=>H-pad-(v/max)*(H-pad*2);
    const path=pts.map((p,i)=>`${i===0?"M":"L"} ${x(i)} ${y(p)}`).join(" ");
    const area=`${path} L ${x(pts.length-1)} ${H-pad} L ${pad} ${H-pad} Z`;
    return <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", maxWidth:480 }}>
      <path d={area} fill="#207460" opacity="0.08"/>
      <path d={path} fill="none" stroke="#207460" strokeWidth="2.5"/>
      {pts.map((p,i)=><circle key={i} cx={x(i)} cy={y(p)} r="3" fill="#207460"/>)}
    </svg>;
  }
  if(type==="grouped-count"){
    const bars=[38,24,18,14,9,5],max=Math.max(...bars);
    return <div style={{ width:"100%", maxWidth:480, display:"flex", alignItems:"flex-end", gap:12, height:200 }}>
      {bars.map((b,i)=><div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:6 }}>
        <div style={{ fontSize:11, color:"#525C59", fontWeight:500 }}>{b}</div>
        <div style={{ width:"100%", height:(b/max)*160, background:colors[i%colors.length], borderRadius:"4px 4px 0 0" }}></div>
      </div>)}
    </div>;

const WA_DEPTS = [
  {dept:"Engineering",    h1b:[12,8,44],  l1:[3,2,12], tn:[2,1,8],  o1:[0,1,3]},
  {dept:"Hardware",       h1b:[7,5,31],   l1:[2,1,8],  tn:[3,2,6],  o1:[0,0,2]},

  {dept:"Data & Analytics",h1b:[5,3,14],  l1:[1,0,3],  tn:[0,0,0],  o1:[0,0,1]},
  {dept:"Customer Eng",   h1b:[2,1,8],    l1:[0,0,0],  tn:[1,1,3],  o1:[0,0,0]},
  {dept:"Operations",     h1b:[1,1,4],    l1:[1,0,3],  tn:[0,0,0],  o1:[0,0,0]},
  {dept:"Marketing",      h1b:[1,1,3],    l1:[0,0,0],  tn:[1,0,1],  o1:[0,0,0]},
  {dept:"Finance",        h1b:[1,0,3],    l1:[0,0,1],  tn:[0,0,0],  o1:[0,0,0]},
];

function cellColor(v, bucketIdx) {
  if (v === 0) return { color:"#C4CBCA", fontWeight:400 };
  if (bucketIdx === 0 && v >= 5) return { color:"#DC455A", fontWeight:600 };
  if (bucketIdx === 0 && v > 0)  return { color:"#E55767", fontWeight:500 };
  if (bucketIdx === 1 && v >= 3) return { color:"#D97706", fontWeight:500 };
  return { color:"#161A18", fontWeight:400 };
}

function subtotalColor(v, bucketIdx) {
  if (v === 0) return { bg:"#F5F7F6", color:"#C4CBCA", fontWeight:400 };
  if (bucketIdx === 0 && v >= 10) return { bg:"#FEE2E2", color:"#DC455A", fontWeight:700 };
  if (bucketIdx === 0)            return { bg:"#FEF2F2", color:"#E55767", fontWeight:600 };
  if (bucketIdx === 1 && v >= 5)  return { bg:"#FEF3C7", color:"#D97706", fontWeight:600 };
  if (bucketIdx === 1)            return { bg:"#FFFBEB", color:"#D97706", fontWeight:500 };
  return { bg:"#F5F7F6", color:"#525C59", fontWeight:500 };
}

function WorkAuthTable() {
  const [hovRow, setHovRow] = React.useState(null);
  const visaTypes = ["H-1B","L-1A","TN","O-1A"];
  const buckets = [
    { label:"Expiring 0–6 months", short:"0–6 mo", color:"#DC455A", bg:"#FFF5F5" },
    { label:"Expiring 6–9 months", short:"6–9 mo", color:"#D97706", bg:"#FFFBEB" },
    { label:"Expiring 9+ months",  short:"9+ mo",  color:"#767F7D", bg:"#F5F7F6" },
  ];

  // Compute totals
  const totals = WA_DEPTS.reduce((acc, d) => {
    [d.h1b,d.l1,d.tn,d.o1].forEach((arr,vi) => {
      arr.forEach((v,bi) => { acc[bi] = acc[bi]||[0,0,0,0]; acc[bi][vi]=(acc[bi][vi]||0)+v; });
    });
    return acc;
  }, {});

  const rowData = (d) => [d.h1b,d.l1,d.tn,d.o1];
  const rowSubtotal = (d, bi) => rowData(d).reduce((s,arr)=>s+(arr[bi]||0),0);

  const th = (children, style={}) => (
    <th style={{ padding:"8px 12px", fontSize:11, fontWeight:600, color:"#525C59",
                 background:"#F5F7F6", whiteSpace:"nowrap",
                 borderBottom:"1px solid #E0E5E4", textAlign:"right", ...style }}>
      {children}
    </th>
  );

  return (
    <div style={{ width:"100%", overflowX:"auto" }}>
      <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
        <thead>
          {/* Bucket group headers */}
          <tr>
            <th rowSpan={2} style={{ padding:"10px 16px", textAlign:"left", fontSize:11,
              fontWeight:600, color:"#525C59", background:"#F5F7F6",
              borderBottom:"1px solid #E0E5E4", borderRight:"1px solid #E0E5E4",
              position:"sticky", left:0, zIndex:3, minWidth:160 }}>
              Department
            </th>
            {buckets.map((b,bi) => (
              <th key={bi} colSpan={5} style={{
                padding:"8px 0 6px", textAlign:"center",
                fontSize:11, fontWeight:600, letterSpacing:"0.03em",
                color:b.color, background:b.bg,
                borderBottom:`2px solid ${b.color}30`,
                borderLeft:"1px solid #E0E5E4",
              }}>
                <span style={{ display:"inline-flex", alignItems:"center", gap:5 }}>
                  <span style={{ width:7, height:7, borderRadius:2, background:b.color }}></span>
                  {b.label}
                </span>
              </th>
            ))}
          </tr>
          {/* Column headers */}
          <tr>
            {buckets.map((b,bi) => (
              <React.Fragment key={bi}>
                {visaTypes.map((vt,vi) => th(vt, {
                  background: bi===0?"#FFF5F5":bi===1?"#FFFBEB":"#F5F7F6",
                  borderLeft: vi===0?"1px solid #E0E5E4":"none",
                  color: vi===0?b.color:"#767F7D",
                  fontWeight: vi===0?600:500,
                }))}
                {th("Total", {
                  background: bi===0?"#FEE2E2":bi===1?"#FEF3C7":"#EFF2F1",
                  color: b.color, fontWeight:700,
                  borderRight: bi<2?"1px solid #E0E5E4":"none",
                })}
              </React.Fragment>
            ))}
          </tr>
        </thead>
        <tbody>
          {WA_DEPTS.map((d,di) => {
            const isHov = hovRow===di;
            return (
              <tr key={di}
                onMouseEnter={()=>setHovRow(di)}
                onMouseLeave={()=>setHovRow(null)}
                style={{ borderBottom:"1px solid #F5F7F6",
                         background: isHov?"#FCFDFC":"#fff",
                         transition:"background 80ms" }}
              >
                <td style={{ padding:"11px 16px", fontWeight:500, color:"#161A18",
                  fontSize:13, position:"sticky", left:0, zIndex:1,
                  background: isHov?"#FCFDFC":"#fff",
                  borderRight:"1px solid #E0E5E4" }}>
                  {d.dept}
                </td>
                {buckets.map((b,bi) => {
                  const vals = rowData(d).map(arr => arr[bi]);
                  const sub  = vals.reduce((s,v)=>s+v,0);
                  const sc   = subtotalColor(sub, bi);
                  return (
                    <React.Fragment key={bi}>
                      {vals.map((v,vi) => {
                        const cc = cellColor(v, bi);
                        return (
                          <td key={vi} style={{
                            padding:"11px 12px", textAlign:"right",
                            color: v===0?"#D1D5D4":cc.color,
                            fontWeight: cc.fontWeight,
                            fontSize:13,
                            fontVariantNumeric:"tabular-nums",
                            borderLeft: vi===0?"1px solid #E0E5E4":"none",
                          }}>
                            {v===0?"—":v}
                          </td>
                        );
                      })}
                      <td style={{
                        padding:"11px 12px", textAlign:"right",
                        background:sc.bg, color:sc.color,
                        fontWeight:sc.fontWeight, fontSize:13,
                        fontVariantNumeric:"tabular-nums",
                        borderRight: bi<2?"1px solid #E0E5E4":"none",
                      }}>
                        {sub===0?"—":sub}
                      </td>
                    </React.Fragment>
                  );
                })}
              </tr>
            );
          })}
          {/* Totals row */}
          <tr style={{ borderTop:"2px solid #E0E5E4", background:"#F5F7F6" }}>
            <td style={{ padding:"11px 16px", fontWeight:600, fontSize:12,
              color:"#525C59", textTransform:"uppercase", letterSpacing:"0.04em",
              position:"sticky", left:0, background:"#F5F7F6", zIndex:1,
              borderRight:"1px solid #E0E5E4" }}>
              Total
            </td>
            {buckets.map((b,bi) => {
              const viTotals = visaTypes.map((_,vi) =>
                WA_DEPTS.reduce((s,d) => s+rowData(d)[vi][bi], 0)
              );
              const grandSub = viTotals.reduce((s,v)=>s+v,0);
              const sc = subtotalColor(grandSub, bi);
              return (
                <React.Fragment key={bi}>
                  {viTotals.map((v,vi) => (
                    <td key={vi} style={{
                      padding:"11px 12px", textAlign:"right",
                      fontWeight:600, fontSize:13,
                      color: v===0?"#C4CBCA":(bi===0?"#DC455A":bi===1?"#D97706":"#161A18"),
                      fontVariantNumeric:"tabular-nums",
                      borderLeft: vi===0?"1px solid #E0E5E4":"none",
                    }}>
                      {v===0?"—":v}
                    </td>
                  ))}
                  <td style={{
                    padding:"11px 12px", textAlign:"right",
                    background:sc.bg, color:sc.color,
                    fontWeight:700, fontSize:13,
                    fontVariantNumeric:"tabular-nums",
                    borderRight: bi<2?"1px solid #E0E5E4":"none",
                  }}>
                    {grandSub}
                  </td>
                </React.Fragment>
              );
            })}
          </tr>
        </tbody>
      </table>
    </div>
  );
}

function FrameShell({ width, scale, height, children }) {
  return (
    <div style={{
      width: width * scale,
      height: height * scale,
      overflow: "hidden",
      borderRadius: 10,
      border: "1px solid #D5DBDA",
      boxShadow: "0 2px 12px rgba(10,13,20,0.10), 0 1px 2px rgba(10,13,20,0.04)",
      position: "relative",
      background: "#FCFDFC",
    }}>
      <div style={{
        width: width,
        height: height,
        transform: `scale(${scale})`,
        transformOrigin: "top left",
        overflow: "hidden",
        pointerEvents: "none",
        userSelect: "none",
      }}>
        {children}
      </div>
    </div>
  );
}

function CanvasTopBar({ stepId, reportName, showSave }) {

      <div style={{ flex:1, display:"flex", justifyContent:"center", alignItems:"center", gap:14 }}>
        <div style={{ display:"inline-flex", alignItems:"center", padding:3,
          background:"#F5F7F6", border:"1px solid #E0E5E4", borderRadius:8, gap:2 }}>
          {steps.map(s => {
            const active = stepId===s.id;
            const done = ["g","i","j"].indexOf(s.id) < ["g","i","j"].indexOf(stepId);
            return (
              <div key={s.id} style={{
                display:"inline-flex", alignItems:"center", gap:5,
                height:26, padding:"0 10px", borderRadius:6,
                background:active?"#fff":"transparent",
                border:`1px solid ${active?"#E0E5E4":"transparent"}`,

                <span style={{
                  width:16, height:16, borderRadius:999, display:"grid", placeItems:"center",
                  background:active?"#207460":(done?"#76C08D":"#D5DBDA"),
                  color:"#fff", fontSize:10, fontWeight:600,
                }}>
                  {done ? <i className="ri-check-line" style={{ fontSize:10 }}></i> : s.n}

                {s.label}

          })}
        </div>
        {reportName && (

            <span style={{ fontFamily:"'Inter Display',Inter", fontSize:14,

            <i className="ri-pencil-line" style={{ color:"#9AA3A1", fontSize:14 }}></i>
          </div>
        )}

      {/* Actions */}

          <>
            <div style={{ width:32, height:32, display:"grid", placeItems:"center",

          {/* K: Cardinality warning */}
          <div className="frame-wrap">
            <div className="frame-label">
              <span className="frame-num">K</span>
              <span className="frame-name">Cardinality warning — 15–25 values</span>
            </div>
            <GuardrailFrame type="warning-cardinality"/>
          </div>

          {/* L: Cardinality block */}
          <div className="frame-wrap">
            <div className="frame-label">
              <span className="frame-num">L</span>
              <span className="frame-name">Cardinality block — 25+ values</span>
            </div>
            <GuardrailFrame type="block-cardinality"/>
          </div>

          {/* M: Pie blocked */}
          <div className="frame-wrap">
            <div className="frame-label">
              <span className="frame-num">M</span>
              <span className="frame-name">Pie chart blocked</span>
            </div>
            <GuardrailFrame type="pie-blocked"/>
          </div>

          {/* N: Line restricted */}
          <div className="frame-wrap">
            <div className="frame-label">
              <span className="frame-num">N</span>
              <span className="frame-name">Line chart restricted</span>
            </div>
            <GuardrailFrame type="line-restricted"/>
          </div>

          {/* O: Low data coverage */}
          <div className="frame-wrap">
            <div className="frame-label">
              <span className="frame-num">O</span>
              <span className="frame-name">Low data coverage warning</span>
            </div>
            <GuardrailFrame type="low-coverage"/>
          </div>

          {/* P: No data */}
          <div className="frame-wrap">
            <div className="frame-label">
              <span className="frame-num">P</span>
              <span className="frame-name">No data — filters too narrow</span>
            </div>
            <GuardrailFrame type="no-data"/>
          </div>

        </div>
      </div>

    </div>
  );
}

// ── Guardrail mini-frames (focused close-ups) ─────────────────
function GuardrailFrame({ type }) {
  const W = 380, H = 280, scale = 0.85;
  return (
    <div style={{
      width: W * scale, height: H * scale, overflow:"hidden",
      borderRadius:10, border:"1px solid #D5DBDA",
      boxShadow:"0 2px 8px rgba(10,13,20,0.08)",
    }}>
      <div style={{ width:W, height:H, transform:`scale(${scale})`,
        transformOrigin:"top left", overflow:"hidden", pointerEvents:"none" }}>
        <GuardrailContent type={type} W={W} H={H}/>
      </div>
    </div>
  );
}

function GuardrailContent({ type, W, H }) {
  const railStyle = {
    width:W, background:"#fff", padding:"14px 16px",
    fontFamily:"Inter,system-ui", fontSize:13, color:"#161A18",
  };
  const sectionLabel = {
    fontSize:10, fontWeight:500, color:"#525C59",
    letterSpacing:"0.06em", textTransform:"uppercase",
    marginBottom:8,
  };
  const warning = {
    display:"flex", alignItems:"flex-start", gap:8,
    padding:"10px 12px", borderRadius:8,
    background:"#FFFBEB", border:"1px solid #FDE68A",
    fontSize:12, color:"#92400E", lineHeight:"18px", marginTop:8,
  };
  const error = {
    display:"flex", alignItems:"flex-start", gap:8,
    padding:"10px 12px", borderRadius:8,
    background:"#FEF2F2", border:"1px solid #FECACA",
    fontSize:12, color:"#991B1B", lineHeight:"18px", marginTop:8,
  };
  const info = {
    display:"flex", alignItems:"flex-start", gap:8,
    padding:"10px 12px", borderRadius:8,
    background:"#EFF6FF", border:"1px solid #BFDBFE",
    fontSize:12, color:"#1E40AF", lineHeight:"18px", marginTop:8,
  };
  const chipStyle = (filled) => ({
    display:"inline-flex", alignItems:"center", gap:5,
    padding:"5px 8px", background:filled?"#F5F7F6":"#fff",
    border:`1px solid ${filled?"#E0E5E4":"#C4CBCA"}`,
    borderRadius:6, fontSize:12,
  });
  const vizGrid = (activeId) => (
    <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:5, marginBottom:8 }}>
      {[
        {id:"bar",icon:"ri-bar-chart-2-fill"},
        {id:"stacked",icon:"ri-bar-chart-grouped-fill"},
        {id:"hbar",icon:"ri-bar-chart-horizontal-fill"},
        {id:"line",icon:"ri-line-chart-line",disabled:type==="line-restricted"},
        {id:"pie",icon:"ri-pie-chart-2-line",disabled:type==="pie-blocked"||type==="warning-cardinality"||type==="block-cardinality"},
        {id:"table",icon:"ri-table-line"},
        {id:"list",icon:"ri-list-check-2"},
        {id:"kpi",icon:"ri-number-1"},
      ].map(t => (
        <div key={t.id} style={{
          height:36, display:"grid", placeItems:"center",
          background:t.id===activeId?"#207460":(t.disabled?"#F5F7F6":"#fff"),
          border:`1px solid ${t.id===activeId?"#207460":(t.disabled?"#EFF2F1":"#E0E5E4")}`,
          borderRadius:7, fontSize:16, position:"relative",
          color:t.disabled?"#C4CBCA":(t.id===activeId?"#fff":"#313836"),
        }}>
          <i className={t.icon}></i>
          {t.disabled && <span style={{ position:"absolute", top:2, right:2,
            width:12,height:12,borderRadius:999,background:"#fff",
            border:"1px solid #E0E5E4",display:"grid",placeItems:"center",
            fontSize:8,color:"#9AA3A1" }}><i className="ri-lock-line"></i></span>}
        </div>
      ))}
    </div>
  );

  if (type==="warning-cardinality") return (
    <div style={railStyle}>
      <div style={sectionLabel}>Grouping</div>
      <div style={chipStyle(true)}>
        <span style={{ width:14,height:14,borderRadius:3,background:"#EFF2F1",color:"#525C59",display:"grid",placeItems:"center",fontSize:9 }}><i className="ri-list-check"></i></span>
        Country of Birth
        <i className="ri-close-line" style={{ color:"#9AA3A1",fontSize:12 }}></i>
      </div>
      <div style={warning}>
        <span style={{ fontSize:14,flexShrink:0 }}>⚠️</span>
        <span><strong>22 categories</strong> — chart may be hard to read. Consider filtering to a subset or switching to a Table report type.</span>
      </div>
      <div style={{ marginTop:12 }}>
        <div style={sectionLabel}>Visualization</div>
        {vizGrid("stacked")}
      </div>
    </div>
  );

  if (type==="block-cardinality") return (
    <div style={railStyle}>
      <div style={sectionLabel}>Grouping</div>
      <div style={{ padding:"10px 12px", background:"#FEF2F2", border:"1px solid #FECACA", borderRadius:6, fontSize:12 }}>
        <div style={{ display:"flex", alignItems:"center", gap:6, color:"#DC455A", fontWeight:500, marginBottom:4 }}>
          <i className="ri-error-warning-line" style={{ fontSize:14 }}></i>
          Cost Center — 230 unique values
        </div>
        <div style={{ color:"#991B1B", lineHeight:"17px" }}>Too many categories for a chart. Use a filter to narrow this down, or switch to a Table or List report type.</div>
      </div>
      <div style={{ ...error, marginTop:12 }}>
        <i className="ri-close-circle-line" style={{ fontSize:16,flexShrink:0,marginTop:1 }}></i>
        <span>Report can't be displayed. Choose a grouping field with fewer than 25 unique values.</span>
      </div>
    </div>
  );

  if (type==="pie-blocked") return (
    <div style={railStyle}>
      <div style={sectionLabel}>Visualization</div>
      {vizGrid("bar")}
      <div style={error}>
        <i className="ri-pie-chart-2-line" style={{ fontSize:15,flexShrink:0 }}></i>
        <span><strong>Pie chart unavailable.</strong> This grouping has 17 categories — pie charts are limited to 5 or fewer. Try a bar chart instead.</span>
      </div>
    </div>
  );

  if (type==="line-restricted") return (
    <div style={railStyle}>
      <div style={sectionLabel}>Visualization</div>
      {vizGrid("bar")}
      <div style={info}>
        <i className="ri-information-line" style={{ fontSize:15,flexShrink:0 }}></i>
        <span>Line charts require a time dimension on the X axis. Switch your primary grouping to <strong>Case Started</strong> or another date field to unlock this.</span>
      </div>
    </div>
  );

  if (type==="low-coverage") return (
    <div style={railStyle}>
      <div style={sectionLabel}>Fields in use</div>
      <div style={chipStyle(true)}>
        <span style={{ width:14,height:14,borderRadius:3,background:"#E1F3FF",color:"#048AF5",display:"grid",placeItems:"center",fontSize:9 }}><i className="ri-calendar-line"></i></span>
        Passport Expiry
        <i className="ri-close-line" style={{ color:"#9AA3A1",fontSize:12 }}></i>
      </div>
      <div style={warning}>
        <span style={{ fontSize:14,flexShrink:0 }}>⚠️</span>
        <span><strong>Passport Expiry</strong> is only <strong>9% populated</strong> — 17 of 198 employees. Results won't represent your full population.</span>
      </div>
      <div style={{ display:"flex", gap:8, marginTop:10 }}>
        {["Proceed anyway","Remove field"].map(l => (
          <button key={l} style={{ flex:1,padding:"6px 0",borderRadius:6,
            border:"1px solid #E0E5E4",background:"#fff",
            fontSize:11,fontWeight:500,color:"#525C59",cursor:"pointer" }}>{l}</button>
        ))}
      </div>
    </div>
  );

  if (type==="no-data") return (
    <div style={{ width:W, height:H, background:"#fff", display:"flex",
      flexDirection:"column", alignItems:"center", justifyContent:"center",
      gap:12, padding:"20px", textAlign:"center" }}>
      <div style={{ width:44,height:44,borderRadius:12,background:"#F5F7F6",
        display:"grid",placeItems:"center",fontSize:22 }}>🔍</div>
      <div style={{ fontSize:15,fontWeight:500,color:"#525C59" }}>No data matches your filters</div>
      <div style={{ fontSize:12,color:"#9AA3A1",lineHeight:"18px",maxWidth:260 }}>
        The current filter combination returned 0 results. Try widening your date range or removing a filter.
      </div>
      <div style={{ display:"flex",gap:8,marginTop:4 }}>
        <button style={{ padding:"6px 14px",borderRadius:7,border:"1px solid #E0E5E4",background:"#fff",fontSize:12,fontWeight:500,color:"#525C59",cursor:"pointer" }}>Clear filters</button>
        <button style={{ padding:"6px 14px",borderRadius:7,border:0,background:"#207460",color:"#fff",fontSize:12,fontWeight:500,cursor:"pointer" }}>Adjust filters</button>
      </div>
    </div>
  );

  return null;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Canvas/>);
</script>
</body>
</html>
